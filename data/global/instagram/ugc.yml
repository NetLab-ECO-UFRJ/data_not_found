metadata:
  platform: Instagram
  scope: UGC
  evaluation_date: 2025-10
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'no'
  notes: Although Meta provides the Meta Content Library API, Instagram data can only be accessed and analyzed within a secure, controlled virtual environment. Beyond aggregated outputs, no data may be exported from this environment without violating Meta's research program terms of use. These restrictions significantly limit transparency and reproducibility, as they prevent researchers from independently verifying results, collaborating across institutions, or applying analytical models that have not been previously approved by Meta. As a result, they run counter to core open science principles and fall short of what our analytical framework considers a minimal requirement for platform transparency and data access.
  notes_pt: Embora a Meta forneça a API Meta Content Library, os dados do Instagram só podem ser acessados ​​e analisados ​​em um ambiente virtual seguro e controlado. Além dos resultados agregados, nenhum dado pode ser exportado deste ambiente sem violar os termos de uso do programa de pesquisa da Meta. Estas restrições limitam significativamente a transparência e a reprodutibilidade, pois impedem os pesquisadores de verificar resultados de forma independente, colaborar entre instituições ou aplicar modelos analíticos que não tenham sido previamente aprovados pelo Meta. Como resultado, vão contra os princípios fundamentais da ciência aberta e ficam aquém do que nosso quadro analítico considera um requisito mínimo para a transparência da plataforma e o acesso aos dados.
- code: UGC_SC2
  selected_answer: 'no'
  notes: Even if the Meta Content Library API falls short of our minimal standard for transparency and data access, it is worth noting that the public content available for analysis is limited to a subset of pages that either meet a minimum follower threshold or are otherwise verified by the platform.
  notes_pt: Mesmo que a API Meta Content Library fique aquém do nosso padrão mínimo de transparência e acesso a dados, vale a pena notar que o conteúdo público disponível para análise é limitado a um subconjunto de páginas que atendem a um limite mínimo de seguidores ou são verificadas de outra forma pela plataforma.
- code: UGC_SC3
  selected_answer: 'no'
  notes: Because it does not allow structured data extraction to users' own infrastructure, the Meta Content Library API falls short of what we consider a minimal standard for transparency and data access, and thus cannot be properly assessed or even tested for this work's purposes. Access to it through Meta's Secure Research Environment (SRE), however, is free of charge. On the other hand, access through SOMAR's Virtual Data Enclave has been subject to fees since January 2026.
  notes_pt: Por não permitir a extração estruturada de dados para a própria infraestrutura dos usuários, a API Meta Content Library fica aquém do que consideramos um padrão mínimo de transparência e acesso aos dados e, portanto, não pode ser adequadamente avaliada ou mesmo testada para os fins deste trabalho. O acesso a ele através do Secure Research Environment (SRE) da Meta, entretanto, é gratuito. Por outro lado, o acesso através do Virtual Data Enclave da SOMAR está sujeito a taxas desde janeiro de 2026.
- code: UGC_SC4
  selected_answer: researchers_only
  notes: In addition to the Meta Content Library API, the company also provides the [Meta Content Library User Interface](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api), which enables approved researchers to visualize and extract granular, structured data on user-generated content across Meta platforms. The tool allows [data extraction](https://developers.facebook.com/docs/content-library-and-api/content-library) from Instagram posts made by business and creator accounts with at least 25,000 followers, personal accounts with at least 25,000 followers, and any business, creator, or personal account with a verified badge.
  notes_pt: Além da API Meta Content Library, a empresa também fornece o [Meta Content Library User Interface](https://web.archive.org/web/20251010131827/https://developers.facebook.com/docs/content-library-and-api), que permite que pesquisadores aprovados visualizem e extraiam dados granulares e estruturados sobre conteúdo gerado pelo usuário em plataformas Meta. A ferramenta permite a [data extraction](https://developers.facebook.com/docs/content-library-and-api/content-library) de postagens do Instagram feitas por contas empresariais e de criadores com pelo menos 25.000 seguidores, contas pessoais com pelo menos 25.000 seguidores e qualquer conta comercial, de criador ou pessoal com um selo verificado.
