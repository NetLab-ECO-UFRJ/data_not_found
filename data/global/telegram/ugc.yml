metadata:
  platform: Telegram
  scope: UGC
  evaluation_date: 2025-11
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'yes'
  notes: Telegram provides an [API](https://core.telegram.org/) that enables access to public data from conversations on the platform.
  notes_pt: O Telegram fornece um [API](https://core.telegram.org/) que permite acesso a dados públicos de conversas na plataforma.
- code: UGC_SC2
  selected_answer: 'no'
  notes: On Telegram, public user-generated content cannot be globally discovered or retrieved through the API without prior participation or explicit identifiers. Access is limited to channels or groups in which the bot or account is already a member, and there is no endpoint that exposes a comprehensive list of all public channels and groups. The API also returns specific errors when requests are made for supergroups or channels of which the requester is not a member (e.g., [`channels.getFullChannel`](https://core.telegram.org/method/channels.getFullChannel)). As a result, the API does not provide membership-free, platform-wide access to the full corpus of public content.
  notes_pt: No Telegram, o conteúdo público gerado pelo usuário não pode ser descoberto ou recuperado globalmente por meio da API sem participação prévia ou identificadores explícitos. O acesso é limitado a canais ou grupos dos quais o bot ou conta já é membro e não há nenhum endpoint que exponha uma lista abrangente de todos os canais e grupos públicos. A API também retorna erros específicos quando solicitações são feitas para supergrupos ou canais dos quais o solicitante não é membro (por exemplo, [`channels.getFullChannel`](https://core.telegram.org/method/channels.getFullChannel)). Como resultado, a API não fornece acesso gratuito em toda a plataforma ao conjunto completo de conteúdo público.
- code: UGC_SC3
  selected_answer: 'yes'
  notes: All [Telegram APIs](https://core.telegram.org/) are free of charge.
  notes_pt: Todos os [Telegram APIs](https://core.telegram.org/) são gratuitos.
- code: UGC_SC4
  selected_answer: 'no'
  notes: The platform does not provide a graphical interface for accessing or extracting public user-generated content data.
  notes_pt: A plataforma não fornece uma interface gráfica para acessar ou extrair dados públicos de conteúdo gerado pelo usuário.
accessibility_answers:
- code: UGC_OC1
  selected_answer: 'yes'
  notes: Responses to requests to the platform API provide the expected data in an appropriate format, without requiring redirection.
  notes_pt: As respostas às solicitações à API da plataforma fornecem os dados esperados em formato apropriado, sem necessidade de redirecionamento.
- code: UGC_OC2
  selected_answer: 'yes'
  notes: The Telegram API access requires an access key that remains the same even after logging in multiple times. It will only change in specific situations, and the API provides the [necessary methods to update it programmatically](https://core.telegram.org/tdlib/getting-started#:~:text=Authorization%20is%20an%20example%20of,description%20of%20the%20current%20AuthorizationState.).
  notes_pt: O acesso à API do Telegram requer uma chave de acesso que permanece a mesma mesmo depois de fazer login várias vezes. Isso só mudará em situações específicas, e a API fornece o [necessary methods to update it programmatically](https://core.telegram.org/tdlib/getting-started#:~:text=Authorization%20is%20an%20example%20of,description%20of%20the%20current%20AuthorizationState.).
- code: UGC_OC3
  selected_answer: 'yes'
  notes: It is possible to extract data for a specific message using its unique identifier, as long as the group or public channel it belongs to is known.
  notes_pt: É possível extrair dados de uma mensagem específica utilizando seu identificador único, desde que seja conhecido o grupo ou canal público ao qual ela pertence.
- code: UGC_OC4
  selected_answer: 'yes'
  notes: Telegram offers the [`messages.search` endpoint](https://core.telegram.org/method/messages.search) for searching for messages by author, as long as the group or public channel the message belongs to is known.
  notes_pt: O Telegram oferece o [`messages.search` endpoint](https://core.telegram.org/method/messages.search) para busca de mensagens por autor, desde que seja conhecido o grupo ou canal público ao qual a mensagem pertence.
- code: UGC_OC5
  selected_answer: 'yes'
  notes: Telegram provides a [`messages.searchGlobal` endpoint](https://core.telegram.org/method/messages.searchGlobal) that allows searching for messages containing specific terms. However, in practice this is limited to public groups and channels that the researcher already knows or in which their account or bot participates. Telegram reportedly offers an expanded global search in a paid tier, but this could not be tested, as the evaluation was conducted using only the free access level across all platforms.
  notes_pt: O Telegram fornece um [`messages.searchGlobal` endpoint](https://core.telegram.org/method/messages.searchGlobal) que permite pesquisar mensagens contendo termos específicos. Porém, na prática isso se limita a grupos e canais públicos que o pesquisador já conhece ou dos quais sua conta ou bot participa. O Telegram supostamente oferece uma busca global expandida em um nível pago, mas isso não pôde ser testado, pois a avaliação foi realizada usando apenas o nível de acesso gratuito em todas as plataformas.
- code: UGC_OC6
  selected_answer: 'yes'
  notes: The publication dates returned by the Telegram API follow the ISO 8601 format.
  notes_pt: As datas de publicação retornadas pela API do Telegram seguem o formato ISO 8601.
compliance_answers:
- code: UGC_OC7
  selected_answer: 'no'
  notes: 'We found no official documentation for the Telegram Database Library (TDLib) that outlines a deprecation policy. While there is a [changelog](https://core.telegram.org/tdlib/Change_Log) on [GitHub](https://github.com/tdlib/td/blob/master/CHANGELOG.md), it documents only changes that have already been made to major releases. The document does not include [removal dates and migration instructions for deprecated features](https://github.com/tdlib/td/issues/3448).'
  notes_pt: 'Não encontramos nenhuma documentação oficial para a Telegram Database Library (TDLib) que descreva uma política de descontinuação. Embora exista um [changelog](https://core.telegram.org/tdlib/Change_Log) em [GitHub](https://github.com/tdlib/td/blob/master/CHANGELOG.md), ele documenta apenas as alterações que já foram feitas nas versões principais. O documento não inclui [removal dates and migration instructions for deprecated features](https://github.com/tdlib/td/issues/3448).'
- code: UGC_OC8
  selected_answer: 'yes'
  notes: Any user can access the [Telegram API documentation](https://core.telegram.org/methods).
  notes_pt: Qualquer usuário pode acessar o [Telegram API documentation](https://core.telegram.org/methods).
- code: UGC_OC9
  selected_answer: 'no'
  notes: The Telegram and TDLib API documentation is not clearly written or well exemplified. Although it provides a technical reference of available classes and methods, it lacks detailed explanations and practical examples showing how to call endpoints or implement common workflows. The structure assumes prior familiarity with Telegram’s internal architecture, which makes it difficult for developers to understand how to use the APIs without relying on third-party resources or community libraries. Methods such as [`messages.getHistory`](https://core.telegram.org/method/messages.getHistory) and TDLib’s [`getMessage`](https://core.telegram.org/tdlib/docs/classtd_1_1td__api_1_1get_message.html) illustrate this lack of clarity, as they do not present expected outputs or practical usage scenarios.
  notes_pt: A documentação da API do Telegram e TDLib não está claramente escrita ou bem exemplificada. Embora forneça uma referência técnica de classes e métodos disponíveis, faltam explicações detalhadas e exemplos práticos que mostrem como chamar endpoints ou implementar fluxos de trabalho comuns. A estrutura pressupõe familiaridade prévia com a arquitetura interna do Telegram, o que torna difícil para os desenvolvedores entenderem como usar as APIs sem depender de recursos de terceiros ou bibliotecas comunitárias. Métodos como [`messages.getHistory`](https://core.telegram.org/method/messages.getHistory) e [`getMessage`](https://core.telegram.org/tdlib/docs/classtd_1_1td__api_1_1get_message.html) do TDLib ilustram essa falta de clareza, pois não apresentam resultados esperados ou cenários práticos de uso.
- code: UGC_OC10
  selected_answer: 'yes'
  notes: The [terms of service](https://core.telegram.org/api/terms) are explicitly referenced in the [Telegram API documentation](https://core.telegram.org/api/obtaining_api_id) and are required reading for developers when obtaining api_id credentials.
  notes_pt: Os [terms of service](https://core.telegram.org/api/terms) são explicitamente referenciados em [Telegram API documentation](https://core.telegram.org/api/obtaining_api_id) e são de leitura obrigatória para desenvolvedores ao obterem credenciais api_id.
- code: UGC_OC11
  selected_answer: 'no'
  notes: The Telegram and TDLib API documentation does not consistently specify the response format for each endpoint. Although object schemas and return types are defined, the documentation often lacks explicit response examples and per-endpoint error code descriptions. Methods such as [`messages.getHistory`](https://core.telegram.org/method/messages.getHistory) in the Telegram API and [`getMessage`](https://core.telegram.org/tdlib/docs/classtd_1_1td__api_1_1get_message.html) in TDLib illustrate this inconsistency, as they do not provide clear examples of expected responses or error-handling details.
  notes_pt: A documentação da API Telegram e TDLib não especifica consistentemente o formato de resposta para cada endpoint. Embora os esquemas de objetos e os tipos de retorno sejam definidos, a documentação geralmente carece de exemplos de respostas explícitas e descrições de códigos de erro por endpoint. Métodos como [`messages.getHistory`](https://core.telegram.org/method/messages.getHistory) na API do Telegram e [`getMessage`](https://core.telegram.org/tdlib/docs/classtd_1_1td__api_1_1get_message.html) no TDLib ilustram essa inconsistência, pois não fornecem exemplos claros de respostas esperadas ou detalhes de tratamento de erros.
- code: UGC_OC12
  selected_answer: 'no'
  notes: The [Telegram API documentation](https://core.telegram.org/tdlib/docs/) is available only in English.
  notes_pt: O [Telegram API documentation](https://core.telegram.org/tdlib/docs/) está disponível apenas em inglês.
- code: UGC_OC13
  selected_answer: 'no'
  notes: While Telegram provides general information on [bot rate limits](https://core.telegram.org/bots/faq#my-bot-is-hitting-limits-how-do-i-avoid-this), the TDLib documentation does not clearly or comprehensively specify quotas or rate limits for each data extraction endpoint.
  notes_pt: Embora o Telegram forneça informações gerais sobre [bot rate limits](https://core.telegram.org/bots/faq#my-bot-is-hitting-limits-how-do-i-avoid-this), a documentação do TDLib não especifica de forma clara ou abrangente cotas ou limites de taxa para cada endpoint de extração de dados.
- code: UGC_OC14
  selected_answer: 'no'
  notes: We found no official policy or technical specification for AI-generated content in Telegram’s API documentation and terms of service.
  notes_pt: Não encontramos nenhuma política oficial ou especificação técnica para conteúdo gerado por IA na documentação da API e nos termos de serviço do Telegram.
completeness_answers:
- code: UGC_OC15
  selected_answer: 'yes'
  notes: Telegram allows [extracting comments data](https://core.telegram.org/api/discussion#channel-comments) from channels that have discussion features enabled. Each comment is treated as a reply within a message thread and can be retrieved as structured data.
  notes_pt: O Telegram permite [extracting comments data](https://core.telegram.org/api/discussion#channel-comments) de canais que possuem recursos de discussão habilitados. Cada comentário é tratado como uma resposta em uma sequência de mensagens e pode ser recuperado como dados estruturados.
- code: UGC_OC16
  selected_answer: 'yes'
  notes: Telegram allows extracting temporary content from groups and channels while it remains available, even if messages are set with an auto-delete timer. Messages are only removed after the timer expires, but during their active period they can be accessed through the API as [regular messages](https://core.telegram.org/method/messages.getHistory) or [stories](https://core.telegram.org/api/stories).
  notes_pt: O Telegram permite extrair conteúdo temporário de grupos e canais enquanto permanece disponível, mesmo que as mensagens estejam configuradas com temporizador de exclusão automática. As mensagens só são removidas após o término do cronômetro, mas durante seu período ativo elas podem ser acessadas através da API como [regular messages](https://core.telegram.org/method/messages.getHistory) ou [stories](https://core.telegram.org/api/stories).
- code: UGC_OC17
  selected_answer: 'yes'
  notes: Telegram's TDLib and core API allow the extraction of historical data without any fixed time limitation, including content older than one year.
  notes_pt: O TDLib e a API principal do Telegram permitem a extração de dados históricos sem qualquer limitação de tempo fixo, incluindo conteúdo com mais de um ano.
- code: UGC_OC18
  selected_answer: 'yes'
  notes: Telegram’s API—including TDLib and the core `messages.*` methods—does not enforce strict global rate limits that would prevent the continuous extraction of large volumes of messages, such as 10,000 posts within 24 hours.
  notes_pt: A API do Telegram – incluindo TDLib e os principais métodos `messages.*` – não impõe limites de taxa globais estritos que impediriam a extração contínua de grandes volumes de mensagens, como 10.000 postagens em 24 horas.
consistency_answers:
- code: UGC_OC19
  selected_answer: 'yes'
  notes: In our tests, the same request was submitted five consecutive times to the Telegram API, and identical results were returned in each case.
  notes_pt: Em nossos testes, a mesma solicitação foi enviada cinco vezes consecutivas à API do Telegram, e resultados idênticos foram retornados em cada caso.
- code: UGC_OC20
  selected_answer: 'yes'
  notes: Our tests indicate that Telegram API responses are consistent with the parameters and filters specified in the requests.
  notes_pt: Nossos testes indicam que as respostas da API do Telegram são consistentes com os parâmetros e filtros especificados nas solicitações.
relevance_answers:
- code: UGC_OC21
  selected_answer: 'yes'
  notes: Based on the tests conducted, requests to the Telegram API made at different times and by different researchers returned consistent data, with only minimal variation.
  notes_pt: Com base nos testes realizados, as solicitações à API do Telegram feitas em momentos diferentes e por diferentes pesquisadores retornaram dados consistentes, com variação mínima.
- code: UGC_OC22
  selected_answer: 'no'
  notes: Telegram’s TDLib and core API do not provide parameters or endpoints that allow filtering messages or posts by the publisher’s geographic location.
  notes_pt: O TDLib e a API principal do Telegram não fornecem parâmetros ou endpoints que permitem filtrar mensagens ou postagens pela localização geográfica do editor.
- code: UGC_OC23
  selected_answer: 'no'
  notes: Telegram’s TDLib and core API do not include parameters or methods that enable filtering messages based on the language of their content.
  notes_pt: O TDLib e a API principal do Telegram não incluem parâmetros ou métodos que permitem filtrar mensagens com base no idioma de seu conteúdo.
- code: UGC_OC24
  selected_answer: 'yes'
  notes: Telegram’s API, including TDLib, supports temporal filtering of messages through parameters that define retrieval ranges. The `SearchRequest` method accepts `min_date` and `max_date` parameters, allowing messages to be fetched within custom date or ID intervals. Similarly, TDLib’s [`getChatHistory`](https://core.telegram.org/method/messages.getHistory#parameters) method enables retrieving messages before or after a specific message ID or timestamp.
  notes_pt: A API do Telegram, incluindo TDLib, suporta filtragem temporal de mensagens através de parâmetros que definem intervalos de recuperação. O método `SearchRequest` aceita os parâmetros `min_date` e `max_date`, permitindo que as mensagens sejam buscadas dentro de datas personalizadas ou intervalos de ID. Da mesma forma, o método [`getChatHistory`](https://core.telegram.org/method/messages.getHistory#parameters) do TDLib permite recuperar mensagens antes ou depois de um ID de mensagem ou carimbo de data/hora específico.
timeliness_answers:
- code: UGC_OC25
  selected_answer: 'yes'
  notes: Telegram's TDLib and core APIs support near-real-time extraction of newly published content through methods like [`messages.getHistory`](https://core.telegram.org/method/messages.getHistory) and [`getUpdates`](https://core.telegram.org/bots/api#getupdates).
  notes_pt: O TDLib e as APIs principais do Telegram suportam a extração quase em tempo real de conteúdo recém-publicado por meio de métodos como [`messages.getHistory`](https://core.telegram.org/method/messages.getHistory) e [`getUpdates`](https://core.telegram.org/bots/api#getupdates).
