metadata:
  platform: LinkedIn
  region_code: GLOBAL
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: full
  notes: Data from all types of ads can be retrieved through the [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) and remains available for collection for up to one year after the ad’s last impression.
  notes_pt: Os dados de todos os tipos de anúncios podem ser recuperados através do [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) e permanecem disponíveis para coleta por até um ano após a última impressão do anúncio.
- code: AD_SC2
  selected_answer: 'no'
  notes: Although the [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) allows users to view ads served on the platform for up to one year after their last impression, it does not provide any means to export structured data.
  notes_pt: Embora o [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) permita que os usuários visualizem anúncios veiculados na plataforma por até um ano após a última impressão, ele não fornece nenhum meio de exportar dados estruturados.
- code: AD_SC3
  selected_answer: 'no'
  notes: Although LinkedIn claims that advertising data can be collected for up to one year after an ad stops running, it is not possible to verify the running period of ads that were served outside the [European Union](https://www.linkedin.com/help/lms/answer/a1620070). Therefore, this item cannot be properly assessed.
  notes_pt: Embora o LinkedIn afirme que os dados publicitários podem ser coletados por até um ano após a interrupção da exibição de um anúncio, não é possível verificar o período de exibição dos anúncios veiculados fora do [European Union](https://www.linkedin.com/help/lms/answer/a1620070). Portanto, este item não pode ser devidamente avaliado.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: The [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) allows users to query and filter ads served to LinkedIn users for up to one year after their last impression.
  notes_pt: O [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) permite que os usuários consultem e filtrem anúncios veiculados aos usuários do LinkedIn por até um ano após a última impressão.
- code: AD_OC2
  selected_answer: both
  notes: Access to the LinkedIn Ad Library, via both the API and the GUI, is free of charge.
  notes_pt: O acesso à Biblioteca de anúncios do LinkedIn, tanto por meio da API quanto da GUI, é gratuito.
- code: AD_OC3
  selected_answer: 'no'
  notes: The [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) returns only the ad URL and information about the advertiser—including their name, page URL, and funder—but does not provide the ad creative or its publication date itself.
  notes_pt: O [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) retorna apenas o URL do anúncio e informações sobre o anunciante, incluindo nome, URL da página e financiador, mas não fornece o criativo do anúncio ou a data de publicação em si.
- code: AD_OC4
  selected_answer: 'yes'
  notes: The [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) provides a form of authentication that allows for renewal without the risk of data loss.
  notes_pt: O [LinkedIn Ad Library API](https://www.linkedin.com/ad-library/api) fornece uma forma de autenticação que permite a renovação sem risco de perda de dados.
- code: AD_OC5
  selected_answer: gui
  notes: Through the [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/), it is possible to access the page of a specific ad. By contrast, the API does not allow ads to be retrieved by their ID.
  notes_pt: Através do [LinkedIn Ad Library GUI](https://www.linkedin.com/ad-library/) é possível acessar a página de um determinado anúncio. Por outro lado, a API não permite que os anúncios sejam recuperados pelo seu ID.
- code: AD_OC6
  selected_answer: 'no'
  notes: On both LinkedIn Ad Library [GUI](https://www.linkedin.com/ad-library/) and [API](https://www.linkedin.com/ad-library/api), the advertiser search function retrieves only records containing the queried keyword, rather than allowing direct filtering by a specific advertiser via their username or unique identifier.
  notes_pt: Tanto na LinkedIn Ad Library [GUI](https://www.linkedin.com/ad-library/) quanto na [API](https://www.linkedin.com/ad-library/api), a função de pesquisa de anunciante recupera apenas registros contendo a palavra-chave consultada, em vez de permitir a filtragem direta por um anunciante específico por meio de seu nome de usuário ou identificador exclusivo.
- code: AD_OC7
  selected_answer: both
  notes: It is possible to use keywords to perform searches both through the LinkedIn Ad Library [GUI](https://www.linkedin.com/ad-library/) and [API](https://www.linkedin.com/ad-library/api).
  notes_pt: É possível utilizar palavras-chave para realizar pesquisas tanto na LinkedIn Ad Library [GUI](https://www.linkedin.com/ad-library/) quanto na [API](https://www.linkedin.com/ad-library/api).
- code: AD_OC8
  selected_answer: 'no'
  notes: This item cannot be verified because time-related data are not available for ads served outside the European Union in the LinkedIn Ad Library.
  notes_pt: Este item não pode ser verificado porque os dados relacionados ao tempo não estão disponíveis para anúncios veiculados fora da União Europeia na Biblioteca de anúncios do LinkedIn.
completeness_answers:
- code: AD_OC9
  selected_answer: both
  notes: The LinkedIn Ad Library provides URLs for the pages and profiles of the entities that ran the ads.
  notes_pt: A LinkedIn Ad Library fornece URLs para as páginas e perfis das entidades que veicularam os anúncios.
- code: AD_OC10
  selected_answer: both
  notes: The LinkedIn Ad Library provides the registered names of the ads’ funders.
  notes_pt: A LinkedIn Ad Library fornece os nomes registrados dos financiadores dos anúncios.
- code: AD_OC11
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on the running period of ads that were only [served outside the European Union](https://www.linkedin.com/help/lms/answer/a1620070).
  notes_pt: A Biblioteca de anúncios do LinkedIn não fornece dados sobre o período de exibição de anúncios que eram apenas [served outside the European Union](https://www.linkedin.com/help/lms/answer/a1620070).
- code: AD_OC12
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on user engagement with ads.
  notes_pt: A Biblioteca de anúncios do LinkedIn não fornece dados sobre o envolvimento do usuário com os anúncios.
- code: AD_OC13
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on advertisers’ verification status.
  notes_pt: A LinkedIn Ad Library não fornece quaisquer dados sobre o status de verificação dos anunciantes.
compliance_answers:
- code: AD_OC14
  selected_answer: 'no'
  notes: Although moderated ads can be identified through the LinkedIn Ad Library, the platform provides no information about their content or advertiser, only their unique ID. Moreover, it offers no indication of the moderation date or the reasons for moderation.
  notes_pt: Embora os anúncios moderados possam ser identificados através da Biblioteca de Anúncios do LinkedIn, a plataforma não fornece informações sobre seu conteúdo ou anunciante, apenas seu ID exclusivo. Além disso, não oferece nenhuma indicação da data da moderação ou dos motivos da moderação.
- code: AD_OC15
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any information regarding the use of generative AI in the creation or manipulation of ad content.
  notes_pt: A Biblioteca de anúncios do LinkedIn não fornece nenhuma informação sobre o uso de IA generativa na criação ou manipulação de conteúdo publicitário.
- code: AD_OC16
  selected_answer: both
  notes: Any user can access [LinkedIn Ad Library’s documentation](https://www.linkedin.com/help/linkedin/answer/a1517918). Some public documentation for the GUI is available in the form of an [FAQ](https://www.linkedin.com/ad-library).
  notes_pt: Qualquer usuário pode acessar [LinkedIn Ad Library’s documentation](https://www.linkedin.com/help/linkedin/answer/a1517918). Alguma documentação pública para a GUI está disponível na forma de [FAQ](https://www.linkedin.com/ad-library).
- code: AD_OC17
  selected_answer: gui
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) lacks sufficient explanations and references, as it provides only a single response example, limited to ads served in European Union countries.
  notes_pt: O [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) carece de explicações e referências suficientes, pois fornece apenas um único exemplo de resposta, limitado a anúncios veiculados em países da União Europeia.
- code: AD_OC18
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not reference any specific terms of use for either its API or its GUI.
  notes_pt: A Biblioteca de anúncios do LinkedIn não faz referência a nenhum termo de uso específico para sua API ou GUI.
- code: AD_OC19
  selected_answer: both
  notes: The LinkedIn Ad Library’s documentation is displayed in the [language defined by the user](https://www.linkedin.com/help/linkedin/answer/a522175).
  notes_pt: A documentação da LinkedIn Ad Library é exibida em [language defined by the user](https://www.linkedin.com/help/linkedin/answer/a522175).
- code: AD_OC20
  selected_answer: 'no'
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) does not describe any deprecation strategy intended to prevent breaking changes in client applications.
  notes_pt: O [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) não descreve nenhuma estratégia de descontinuação destinada a evitar alterações significativas em aplicativos clientes.
- code: AD_OC21
  selected_answer: 'yes'
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) details the response format of its sole available endpoint.
  notes_pt: O [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) detalha o formato de resposta de seu único endpoint disponível.
- code: AD_OC22
  selected_answer: 'no'
  notes: The [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) does not specify any usage quotas or rate limits.
  notes_pt: O [LinkedIn Ad Library API’s documentation](https://www.linkedin.com/ad-library/api/ads) não especifica nenhuma cota de uso ou limite de taxa.
consistency_answers:
- code: AD_OC23
  selected_answer: 'no'
  notes: Although the data retrieved via the LinkedIn Ad Library API broadly corresponds to what is displayed in the GUI, the platform does not provide sufficient information or mechanisms to enable a proper comparison between the two. The GUI search interface presents a preview of each ad’s media and text, whereas the API returns no information about ad content, providing only the ad’s URL and advertiser metadata.
  notes_pt: Embora os dados recuperados através da API da LinkedIn Ad Library correspondam amplamente ao que é exibido na GUI, a plataforma não fornece informações ou mecanismos suficientes para permitir uma comparação adequada entre os dois. A interface de pesquisa GUI apresenta uma visualização da mídia e do texto de cada anúncio, enquanto a API não retorna nenhuma informação sobre o conteúdo do anúncio, fornecendo apenas o URL do anúncio e os metadados do anunciante.
- code: AD_OC24
  selected_answer: both
  notes: We conducted a test using the LinkedIn Ad Library API by issuing five identical requests with the same parameters, saving each response to a separate file, and comparing whether all ads appeared consistently across the files. We observed that the full set of ads was present in every response. The GUI was likewise found to return consistent results across repeated queries.
  notes_pt: Realizamos um teste usando a API da LinkedIn Ad Library emitindo cinco solicitações idênticas com os mesmos parâmetros, salvando cada resposta em um arquivo separado e comparando se todos os anúncios apareceram de forma consistente nos arquivos. Observamos que o conjunto completo de anúncios estava presente em todas as respostas. Da mesma forma, descobriu-se que a GUI retorna resultados consistentes em consultas repetidas.
- code: AD_OC25
  selected_answer: 'no'
  notes: This item cannot be verified through either the LinkedIn Ad Library API or GUI. Because the platform provides no time-related data for ads that ran outside the European Union, it is impossible to assess whether this parameter is correctly applied. Moreover, since the API does not expose ad creative content, it is also not possible to verify whether ads actually match the queried keywords.
  notes_pt: Este item não pode ser verificado por meio da API ou da GUI da LinkedIn Ad Library. Como a plataforma não fornece dados relativos ao tempo para anúncios veiculados fora da União Europeia, é impossível avaliar se este parâmetro é aplicado corretamente. Além disso, como a API não expõe o conteúdo do criativo do anúncio, também não é possível verificar se os anúncios realmente correspondem às palavras-chave consultadas.
relevance_answers:
- code: AD_OC26
  selected_answer: 'no'
  notes: The LinkedIn Ad Library allows the application of a time period filter. However, because time-related data is not available for ads that ran outside the European Union, this feature cannot be fully or reliably assessed.
  notes_pt: A LinkedIn Ad Library permite a aplicação de um filtro de período de tempo. No entanto, como os dados relacionados com o tempo não estão disponíveis para anúncios publicados fora da União Europeia, esta funcionalidade não pode ser avaliada de forma completa ou confiável.
- code: AD_OC27
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not allow data to be filtered by ad category.
  notes_pt: A Biblioteca de anúncios do LinkedIn não permite que os dados sejam filtrados por categoria de anúncio.
- code: AD_OC28
  selected_answer: 'no'
  notes: The LinkedIn Ad Library only allows data to be filtered by country.
  notes_pt: A LinkedIn Ad Library só permite que os dados sejam filtrados por país.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any age or gender information about an ad’s audience.
  notes_pt: A Biblioteca de anúncios do LinkedIn não fornece informações de idade ou sexo sobre o público de um anúncio.
- code: AD_OC30
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any subnational location data about an ad’s audience.
  notes_pt: A Biblioteca de anúncios do LinkedIn não fornece dados de localização subnacionais sobre o público-alvo de um anúncio.
- code: AD_OC31
  selected_answer: 'no'
  notes: The LinkedIn Ad Library provides audience targeting criteria data only for ads that were served within the [European Union](https://www.linkedin.com/help/lms/answer/a1620070).
  notes_pt: A Biblioteca de anúncios do LinkedIn fornece dados de critérios de segmentação de público-alvo apenas para anúncios veiculados no [European Union](https://www.linkedin.com/help/lms/answer/a1620070).
- code: AD_OC32
  selected_answer: 'no'
  notes: The LinkedIn Ad Library provides impressions data only for ads that were served within the [European Union](https://www.linkedin.com/help/lms/answer/a1620070).
  notes_pt: A Biblioteca de anúncios do LinkedIn fornece dados de impressões apenas para anúncios veiculados em [European Union](https://www.linkedin.com/help/lms/answer/a1620070).
- code: AD_OC33
  selected_answer: 'no'
  notes: The LinkedIn Ad Library does not provide any data on ad spending.
  notes_pt: A Biblioteca de anúncios do LinkedIn não fornece dados sobre gastos com publicidade.
