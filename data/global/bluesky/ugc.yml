metadata:
  platform: Bluesky
  scope: UGC
  evaluation_date: 2025-10
special-criteria_answers:
- code: UGC_SC1
  selected_answer: 'yes'
  notes: Bluesky provides an API for collecting user-generated content through the [`get-posts`](https://docs.bsky.app/docs/api/app-bsky-feed-get-posts) and [`get-author-feed`](https://docs.bsky.app/docs/api/app-bsky-feed-get-author-feed) endpoints.
  notes_pt: Bluesky fornece uma API para coletar conteúdo gerado pelo usuário por meio dos endpoints [`get-posts`](https://docs.bsky.app/docs/api/app-bsky-feed-get-posts) e [`get-author-feed`](https://docs.bsky.app/docs/api/app-bsky-feed-get-author-feed).
- code: UGC_SC2
  selected_answer: 'yes'
  notes: 'All publicly available user-generated content can be accessed through Bluesky’s API.'
  notes_pt: 'Todo o conteúdo gerado pelo usuário disponível publicamente pode ser acessado por meio da API do Bluesky.'
- code: UGC_SC3
  selected_answer: 'yes'
  notes: The Bluesky API can be accessed using standard account credentials, with no additional approval required.
  notes_pt: A API Bluesky pode ser acessada usando credenciais de conta padrão, sem necessidade de aprovação adicional.
- code: UGC_SC4
  selected_answer: 'no'
  notes: The platform does not provide a graphical interface for accessing or extracting public user-generated content data.
  notes_pt: A plataforma não fornece uma interface gráfica para acessar ou extrair dados públicos de conteúdo gerado pelo usuário.
accessibility_answers:
- code: UGC_OC1
  selected_answer: 'yes'
  notes: Responses to requests to the platform API provide the expected data in an appropriate format, without requiring redirection.
  notes_pt: As respostas às solicitações à API da plataforma fornecem os dados esperados em formato apropriado, sem necessidade de redirecionamento.
- code: UGC_OC2
  selected_answer: 'yes'
  notes: API access is authenticated using standard login credentials, not requiring OAuth tokens and allowing continuous access.
  notes_pt: O acesso à API é autenticado usando credenciais de login padrão, não exigindo tokens OAuth e permitindo acesso contínuo.
- code: UGC_OC3
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extracting data from an individual publication.'
  notes_pt: 'A plataforma oferece um endpoint para extrair dados de uma publicação individual.'
- code: UGC_OC4
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extracting data from an individual author.'
  notes_pt: 'A plataforma oferece um endpoint para extrair dados de um autor individual.'
- code: UGC_OC5
  selected_answer: 'yes'
  notes: 'The platform offers an endpoint for extracting data based on search terms.'
  notes_pt: 'A plataforma oferece um endpoint para extração de dados com base em termos de pesquisa.'
- code: UGC_OC6
  selected_answer: 'yes'
  notes: Bluesky’s API returns dates in ISO 8601 format (YYYY-MM-DD).
  notes_pt: A API do Bluesky retorna datas no formato ISO 8601 (AAAA-MM-DD).
compliance_answers:
- code: UGC_OC7
  selected_answer: 'no'
  notes: Bluesky does not outline a formal deprecation strategy in its API documentation. Although some deprecation notices have been shared via GitHub Discussions, the platform appears to communicate breaking changes primarily through mailing lists and in-app account messages, which may be insufficient to ensure broad awareness among developers.
  notes_pt: Bluesky não descreve uma estratégia formal de descontinuação em sua documentação de API. Embora alguns avisos de descontinuação tenham sido compartilhados por meio de discussões no GitHub, a plataforma parece comunicar alterações importantes principalmente por meio de listas de e-mail e mensagens de contas no aplicativo, o que pode ser insuficiente para garantir ampla conscientização entre os desenvolvedores.
- code: UGC_OC8
  selected_answer: 'yes'
  notes: '[Bluesky’s Developer API documentation](https://docs.bsky.app/) can be accessed without authentication.'
  notes_pt: '[Bluesky’s Developer API documentation](https://docs.bsky.app/) pode ser acessado sem autenticação.'
- code: UGC_OC9
  selected_answer: 'no'
  notes: Bluesky’s Developer API documentation provides limited explanation of its methods. It does not include practical examples, such as sample code or example queries, and the available descriptions were considered insufficient.
  notes_pt: A documentação da API do desenvolvedor do Bluesky fornece explicações limitadas sobre seus métodos. Não inclui exemplos práticos, como exemplos de código ou exemplos de consultas, e as descrições disponíveis foram consideradas insuficientes.
- code: UGC_OC10
  selected_answer: 'no'
  notes: Bluesky currently provides only general-purpose policies for use of the platform, including its [Terms of Service](https://bsky.social/about/support/tos), [Privacy Policy](https://bsky.social/about/support/privacy-policy), and [Copyright Policy](https://bsky.social/about/support/copyright). These documents govern federated instances and end-user applications of Bluesky but do not contain any explicit or dedicated provisions regulating API usage. For developers, Bluesky publishes [Developer Guidelines](https://docs.bsky.app/docs/support/developer-guidelines). However, these guidelines are not enforceable contractual terms specific to API access or integration.
  notes_pt: Atualmente, a Bluesky fornece apenas políticas de uso geral para uso da plataforma, incluindo [Terms of Service](https://bsky.social/about/support/tos), [Privacy Policy](https://bsky.social/about/support/privacy-policy) e [Copyright Policy](https://bsky.social/about/support/copyright). Esses documentos regem instâncias federadas e aplicativos de usuário final do Bluesky, mas não contêm quaisquer disposições explícitas ou dedicadas que regulem o uso da API. Para desenvolvedores, Bluesky publica [Developer Guidelines](https://docs.bsky.app/docs/support/developer-guidelines). No entanto, estas diretrizes não são termos contratuais aplicáveis ​​específicos para acesso ou integração de API.
- code: UGC_OC11
  selected_answer: 'yes'
  notes: A response schema is specified for each endpoint in the documentation.
  notes_pt: Um esquema de resposta é especificado para cada endpoint na documentação.
- code: UGC_OC12
  selected_answer: 'no'
  notes: '[Bluesky’s Developer API documentation](https://docs.bsky.app/) is currently available only in English.'
  notes_pt: '[Bluesky’s Developer API documentation](https://docs.bsky.app/) atualmente está disponível apenas em inglês.'
- code: UGC_OC13
  selected_answer: 'yes'
  notes: Information regarding API quotas and rate limits is provided in the platform’s [Getting Started guide](https://docs.bsky.app/docs/get-started).
  notes_pt: Informações sobre cotas de API e limites de taxa são fornecidas no [Getting Started guide](https://docs.bsky.app/docs/get-started) da plataforma.
- code: UGC_OC14
  selected_answer: 'no'
  notes: The Bluesky API allows post authors to self-label their content using the [`SelfLabel` definition](https://atproto.blue/en/latest/atproto/atproto_client.models.com.atproto.label.defs.html#atproto_client.models.com.atproto.label.defs.SelfLabel). However, there is no specific label for AI-generated content. In the current user interface, only pre-defined labels can be added to posts with media, and “AI-generated content” is not among the available options.
  notes_pt: A API Bluesky permite que os autores das postagens auto-rotulem seu conteúdo usando o [`SelfLabel` definition](https://atproto.blue/en/latest/atproto/atproto_client.models.com.atproto.label.defs.html#atproto_client.models.com.atproto.label.defs.SelfLabel). No entanto, não existe um rótulo específico para conteúdo gerado por IA. Na interface de usuário atual, apenas rótulos predefinidos podem ser adicionados às postagens com mídia, e “conteúdo gerado por IA” não está entre as opções disponíveis.
completeness_answers:
- code: UGC_OC15
  selected_answer: not_applicable
  notes: Bluesky does not have dedicated comment features like other social media platforms analyzed in this study.
  notes_pt: Bluesky não possui recursos de comentários dedicados como outras plataformas de mídia social analisadas neste estudo.
- code: UGC_OC16
  selected_answer: not_applicable
  notes: Currently, Bluesky does not have built-in support for ephemeral content.
  notes_pt: Atualmente, Bluesky não possui suporte integrado para conteúdo efêmero.
- code: UGC_OC17
  selected_answer: 'yes'
  notes: 'It is possible to extract historical data through the Bluesky API.'
  notes_pt: 'É possível extrair dados históricos através da API Bluesky.'
- code: UGC_OC18
  selected_answer: 'yes'
  notes: 'We were able to obtain over 10,000 publications in less than ten minutes throughout our testing.'
  notes_pt: 'Conseguimos obter mais de 10.000 publicações em menos de dez minutos durante nossos testes.'
consistency_answers:
- code: UGC_OC19
  selected_answer: 'yes'
  notes: 'The same request was submitted five consecutive times, and identical results were retrieved in each instance throughout our testing.'
  notes_pt: 'A mesma solicitação foi enviada cinco vezes consecutivas e resultados idênticos foram recuperados em cada instância durante nossos testes.'
- code: UGC_OC20
  selected_answer: 'yes'
  notes: 'All retrieved results were coherent and aligned with the queries and parameters applied during testing.'
  notes_pt: 'Todos os resultados recuperados foram coerentes e alinhados com as consultas e parâmetros aplicados durante o teste.'
relevance_answers:
- code: UGC_OC21
  selected_answer: 'yes'
  notes: 'All key elements displayed in the user interface are also present in the API responses, ensuring that programmatically retrieved data mirrors the information available through the platform’s front-end.'
  notes_pt: 'Todos os elementos-chave exibidos na interface do usuário também estão presentes nas respostas da API, garantindo que os dados recuperados programaticamente espelhem as informações disponíveis no front-end da plataforma.'
- code: UGC_OC22
  selected_answer: 'no'
  notes: 'Bluesky’s API does not support filtering data by publisher location.'
  notes_pt: 'A API do Bluesky não oferece suporte à filtragem de dados por localização do editor.'
- code: UGC_OC23
  selected_answer: 'yes'
  notes: 'Bluesky’s API allows filtering data by language. '
  notes_pt: 'A API do Bluesky permite filtrar dados por idioma.'
- code: UGC_OC24
  selected_answer: 'yes'
  notes: 'Bluesky’s API allows filtering data by specific time periods.'
  notes_pt: 'A API do Bluesky permite filtrar dados por períodos de tempo específicos.'
timeliness_answers:
- code: UGC_OC25
  selected_answer: 'yes'
  notes: 'The platform’s API provides near real-time access to newly published content.'
  notes_pt: 'A API da plataforma fornece acesso quase em tempo real ao conteúdo recém-publicado.'
