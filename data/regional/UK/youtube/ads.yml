metadata:
  platform: Google
  region_code: UK
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: partial
  notes: 'Google provides access to data from its [Ads Transparency Center](https://adstransparency.google.com/?region=GB) via [BigQuery](https://cloud.google.com/bigquery). However, in the UK, it is only possible to access [data on political ads](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) that were served in the country over the past seven years.'
  notes_pt: 'O Google fornece acesso aos dados da [Ads Transparency Center](https://adstransparency.google.com/?region=GB) por meio do [BigQuery](https://cloud.google.com/bigquery). No entanto, no Reino Unido, só é possível acessar [data on political ads](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) que foram veiculados no país nos últimos sete anos.'
- code: AD_SC2
  selected_answer: partial
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?region=GB), a web-based interface that allows users to search for and view ads across Google products, including YouTube. The tool lets users filter results by advertiser, date range, region, and ad format to explore advertising content. However, in the UK, the data export feature is limited to ads labeled as political that were shown to users in the country.
  notes_pt: O Google fornece a [Ads Transparency Center](https://adstransparency.google.com/?region=GB), uma interface baseada na Web que permite aos usuários pesquisar e visualizar anúncios em produtos do Google, incluindo o YouTube. A ferramenta permite que os usuários filtrem os resultados por anunciante, período, região e formato do anúncio para explorar o conteúdo publicitário. No entanto, no Reino Unido, o recurso de exportação de dados está limitado a anúncios rotulados como políticos que foram exibidos aos usuários no país.
- code: AD_SC3
  selected_answer: partial
  notes: As the [Ads Transparency Center](https://adstransparency.google.com/?region=GB) and [Google BigQuery](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) allow the extraction of data on ads labeled as political that were served at any point over the past seven years, it is possible to retrieve both inactive and currently active ads.
  notes_pt: Como a [Ads Transparency Center](https://adstransparency.google.com/?region=GB) e o [Google BigQuery](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) permitem a extração de dados sobre anúncios rotulados como políticos veiculados em qualquer momento nos últimos sete anos, é possível recuperar anúncios inativos e atualmente ativos.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?region=GB), a web-based interface that allows users to search for and view ads across Google products, including YouTube. It includes ads from verified advertisers shown within the past 365 days (or up to seven years for political ads), as well as ads from unverified advertisers in Europe, including the UK, and Turkey.
  notes_pt: O Google fornece a [Ads Transparency Center](https://adstransparency.google.com/?region=GB), uma interface baseada na Web que permite aos usuários pesquisar e visualizar anúncios em produtos do Google, incluindo o YouTube. Inclui anúncios de anunciantes verificados exibidos nos últimos 365 dias (ou até sete anos para anúncios políticos), bem como anúncios de anunciantes não verificados na Europa, incluindo o Reino Unido e a Turquia.
- code: AD_OC2
  selected_answer: both
  notes: Both the Google Ads Transparency Center and Google BigQuery are publicly available and free to use, with no payment or subscription required, and could be properly tested and assessed.
  notes_pt: Tanto a Central de Transparência do Google Ads quanto o Google BigQuery estão disponíveis publicamente e são de uso gratuito, sem necessidade de pagamento ou assinatura, e podem ser devidamente testados e avaliados.
- code: AD_OC3
  selected_answer: 'no'
  notes: Although it is possible to extract structured data on ads labeled as political in the UK through the Google Ads Transparency Center and Google BigQuery, it is not possible to retrieve any structured information on the content of those ads, as the output only provides a URL linking to each ad’s page on the Ads Transparency Center.
  notes_pt: Embora seja possível extrair dados estruturados sobre anúncios rotulados como políticos no Reino Unido por meio do Google Ads Transparency Center e do Google BigQuery, não é possível recuperar nenhuma informação estruturada sobre o conteúdo desses anúncios, pois o resultado fornece apenas um URL com link para a página de cada anúncio no Ads Transparency Center.
- code: AD_OC4
  selected_answer: 'yes'
  notes: We did not encounter any authentication issues when using Google BigQuery to extract data on ads served to users in the UK, as users only need an active project on Google Cloud Platform to access and run queries.
  notes_pt: Não encontramos problemas de autenticação ao usar o Google BigQuery para extrair dados de anúncios veiculados a usuários no Reino Unido, pois os usuários só precisam de um projeto ativo no Google Cloud Platform para acessar e executar consultas.
- code: AD_OC5
  selected_answer: both
  notes: It is possible to retrieve data for a specific ad through both the Google Ads Transparency Center and, in the case of ads labeled as political, Google BigQuery. Although the web interface does not allow users to search for an ad by its ID, a specific ad can be accessed directly via its URL, which can be easily formatted.
  notes_pt: É possível recuperar dados de um anúncio específico por meio da Central de Transparência do Google Ads e, no caso de anúncios rotulados como políticos, do Google BigQuery. Embora a interface web não permita que os usuários pesquisem um anúncio por seu ID, um anúncio específico pode ser acessado diretamente por meio de sua URL, que pode ser facilmente formatada.
- code: AD_OC6
  selected_answer: both
  notes: The Google Ads Transparency Center allows users to search by advertiser name or domain to view ads from advertisers that were active within the past year. It is also possible to retrieve data on ads labeled as political from specific advertisers via Google BigQuery.
  notes_pt: A Central de Transparência do Google Ads permite que os usuários pesquisem por nome ou domínio do anunciante para visualizar anúncios de anunciantes que estiveram ativos no ano anterior. Também é possível recuperar dados de anúncios rotulados como políticos de anunciantes específicos por meio do Google BigQuery.
- code: AD_OC7
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not allow ads to be retrieved using search terms.
  notes_pt: A Central de Transparência do Google Ads não permite que anúncios sejam recuperados usando termos de pesquisa.
- code: AD_OC8
  selected_answer: api
  notes: The Google Ads Transparency Center displays data, such as dates, using locale-specific formats. For example, the interface may show “Nov 12, 2025”, which follows English localization conventions. This indicates that data presentation is localized according to the user’s region or language settings rather than being standardized or locale-neutral. However, timestamps returned by Google BigQuery are provided in Coordinated Universal Time (UTC) and follow the ISO 8601 standard.
  notes_pt: A Central de Transparência do Google Ads exibe dados, como datas, usando formatos específicos de localidade. Por exemplo, a interface pode mostrar “Nov 12, 2025”, que segue as convenções de localização em inglês. Isso indica que a apresentação dos dados é localizada de acordo com a região ou as configurações de idioma do usuário, em vez de ser padronizada ou neutra em termos de localidade. No entanto, os carimbos de data/hora retornados pelo Google BigQuery são fornecidos no Tempo Universal Coordenado (UTC) e seguem o padrão ISO 8601.
completeness_answers:
- code: AD_OC9
  selected_answer: both
  notes: The Google Ads Transparency Center and Google BigQuery results, in the case of ads labeled as political, disclose the page name and unique identifier associated with each advertiser. It is also possible to access all available ads from a specific advertiser on a dedicated page.
  notes_pt: Os resultados da Central de Transparência do Google Ads e do Google BigQuery, no caso de anúncios rotulados como políticos, divulgam o nome da página e o identificador exclusivo associado a cada anunciante. Também é possível acessar todos os anúncios disponíveis de um anunciante específico em uma página dedicada.
- code: AD_OC10
  selected_answer: 'no'
  notes: The Google Ads Transparency Center only discloses the advertiser’s name and does not provide additional information about sponsors or funders.
  notes_pt: A Central de Transparência do Google Ads divulga apenas o nome do anunciante e não fornece informações adicionais sobre patrocinadores ou financiadores.
- code: AD_OC11
  selected_answer: both
  notes: The Google Ads Transparency Center and Google BigQuery disclose the start and end dates for ads labeled as political. For all other ads, it only provides the last date on which the ad was shown and does not include detailed information on the full period during which the ad was served.
  notes_pt: A Central de Transparência do Google Ads e o Google BigQuery divulgam as datas de início e término de anúncios rotulados como políticos. Para todos os outros anúncios, fornece apenas a última data em que o anúncio foi exibido e não inclui informações detalhadas sobre o período completo durante o qual o anúncio foi veiculado.
- code: AD_OC12
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any data on user engagement with ads.
  notes_pt: A Central de Transparência do Google Ads não fornece dados sobre o envolvimento do usuário com os anúncios.
- code: AD_OC13
  selected_answer: both
  notes: In the UK, the Google Ads Transparency Center distinguishes between verified and unverified advertisers. As political advertisers must undergo a verification process, it is only possible to retrieve data on ads served by verified advertisers through Google BigQuery.
  notes_pt: No Reino Unido, o Centro de Transparência do Google Ads distingue entre anunciantes verificados e não verificados. Como os anunciantes políticos devem passar por um processo de verificação, só é possível recuperar dados de anúncios veiculados por anunciantes verificados por meio do Google BigQuery.
compliance_answers:
- code: AD_OC14
  selected_answer: gui
  notes: The Google Ads Transparency Center discloses information on moderated ads labeled as political, including the reason for moderation and the date on which they were last served. However, the Google BigQuery dataset does not provide any information in this regard.
  notes_pt: A Central de Transparência do Google Ads divulga informações sobre anúncios moderados rotulados como políticos, incluindo o motivo da moderação e a data em que foram veiculados pela última vez. No entanto, o conjunto de dados do Google BigQuery não fornece nenhuma informação a esse respeito.
- code: AD_OC15
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any information regarding the use of generative AI in the creation or manipulation of ad content.
  notes_pt: A Central de Transparência do Google Ads não fornece nenhuma informação sobre o uso de IA generativa na criação ou manipulação de conteúdo publicitário.
- code: AD_OC16
  selected_answer: both
  notes: Despite its limited scope, the [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) can be accessed without registration or login. The [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) for Google BigQuery is also publicly available.
  notes_pt: Apesar de seu escopo limitado, a [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) pode ser acessada sem registro ou login. A [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) do Google BigQuery também está disponível publicamente.
- code: AD_OC17
  selected_answer: both
  notes: Despite its limited scope, the [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) is clearly written and exemplified. The [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) for Google BigQuery is also publicly available and includes demonstration queries and usage examples.
  notes_pt: Apesar do escopo limitado, a [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) está claramente escrita e exemplificada. A [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) do Google BigQuery também está disponível publicamente e inclui consultas de demonstração e exemplos de uso.
- code: AD_OC18
  selected_answer: both
  notes: While the [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) clearly redirects users to its [terms of service](https://adstransparency.google.com/terms), the [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) for Google BigQuery states that “there are no restrictions on the use of this data. It is provided "AS IS" without any warranty, express or implied, from Google. Google disclaims all liability for any damages, direct or indirect, resulting from the use of this dataset.”.
  notes_pt: Embora a [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) redirecione claramente os usuários para os [terms of service](https://adstransparency.google.com/terms), a [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) do Google BigQuery afirma que “não há restrições ao uso desses dados. Eles são fornecidos "COMO ESTÃO", sem qualquer garantia, expressa ou implícita, do Google. O Google se isenta de qualquer responsabilidade por quaisquer danos, diretos ou indiretos, resultantes do uso deste conjunto de dados.”.
- code: AD_OC19
  selected_answer: both
  notes: Both the [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) and the [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) for Google BigQuery are available in English.
  notes_pt: Tanto a [Google Ads Transparency Center documentation](https://adstransparency.google.com/faq) quanto a [Political Advertising on Google dataset documentation](https://console.cloud.google.com/marketplace/details/transparency-report/google-political-ads) do Google BigQuery estão disponíveis em inglês.
- code: AD_OC20
  selected_answer: 'yes'
  notes: The Google Cloud Console provides a dedicated [“Release Notes”](https://console.cloud.google.com/release-notes) page to inform users about announcements of new or updated features, bug fixes, known issues, and deprecated functionality across its services.
  notes_pt: O Console do Google Cloud oferece uma página dedicada [“Release Notes”](https://console.cloud.google.com/release-notes) para informar os usuários sobre recursos novos ou atualizados, correções de bugs, problemas conhecidos e funcionalidades obsoletas em seus serviços.
- code: AD_OC21
  selected_answer: not_applicable
  notes: Because ad data is programmatically extracted from a relational database through Google BigQuery using SQL queries, there are no dataset-specific endpoints to be explored.
  notes_pt: Como os dados de anúncios são extraídos programaticamente de um banco de dados relacional por meio do Google BigQuery usando consultas SQL, não há pontos de extremidade específicos do conjunto de dados a serem explorados.
- code: AD_OC22
  selected_answer: 'yes'
  notes: Each user can process up to 1 TB of data per month through the Google BigQuery free tier.
  notes_pt: Cada usuário pode processar até 1 TB de dados por mês por meio do nível gratuito do Google BigQuery.
consistency_answers:
- code: AD_OC23
  selected_answer: 'yes'
  notes: All information returned by the Google BigQuery dataset for ads labeled as political is also reflected in the Ads Transparency Center web interface, including the advertiser name, ad spending, targeting criteria, and ad impressions.
  notes_pt: Todas as informações retornadas pelo conjunto de dados do Google BigQuery para anúncios rotulados como políticos também são refletidas na interface da web do Ads Transparency Center, incluindo o nome do anunciante, gastos com publicidade, critérios de segmentação e impressões de anúncios.
- code: AD_OC24
  selected_answer: both
  notes: We ran multiple parallel queries in the Ads Transparency Center and confirmed that the results were consistent and reproducible. Moreover, multiple requests to extract data from the Google BigQuery dataset also returned consistent and reproducible results.
  notes_pt: Executamos várias consultas paralelas na Central de transparência de anúncios e confirmamos que os resultados eram consistentes e reproduzíveis. Além disso, diversas solicitações para extrair dados do conjunto de dados do Google BigQuery também retornaram resultados consistentes e reproduzíveis.
- code: AD_OC25
  selected_answer: both
  notes: We ran multiple parallel queries in the Ads Transparency Center and confirmed that the results were consistent with the specified parameters and filters. The same applies to the data extracted from the Google BigQuery dataset.
  notes_pt: Executamos várias consultas paralelas na Central de transparência de anúncios e confirmamos que os resultados eram consistentes com os parâmetros e filtros especificados. O mesmo se aplica aos dados extraídos do conjunto de dados do Google BigQuery.
relevance_answers:
- code: AD_OC26
  selected_answer: both
  notes: The Google Ads Transparency Center supports filtering ads by date after a specific advertiser or target domain has been selected. It is also possible to filter the data extracted from the Google BigQuery dataset by specific time periods.
  notes_pt: A Central de Transparência do Google Ads oferece suporte à filtragem de anúncios por data após a seleção de um anunciante ou domínio de destino específico. Também é possível filtrar os dados extraídos do conjunto de dados do Google BigQuery por períodos específicos.
- code: AD_OC27
  selected_answer: 'no'
  notes: The Google Ads Transparency Center only distinguishes between ads labeled as political and non-political and does not provide filters based on ad categories.
  notes_pt: A Central de Transparência do Google Ads distingue apenas entre anúncios rotulados como políticos e não políticos e não fornece filtros com base em categorias de anúncios.
- code: AD_OC28
  selected_answer: 'no'
  notes: Filtering is only available at the country level in both the Google Ads Transparency Center and the Google BigQuery dataset.
  notes_pt: A filtragem está disponível apenas em nível de país na Central de transparência do Google Ads e no conjunto de dados do Google BigQuery.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any age or gender information about an ad’s audience.
  notes_pt: A Central de Transparência do Google Ads não fornece informações de idade ou sexo sobre o público-alvo de um anúncio.
- code: AD_OC30
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any subnational location data about an ad’s audience.
  notes_pt: A Central de Transparência do Google Ads não fornece dados de localização subnacional sobre o público-alvo de um anúncio.
- code: AD_OC31
  selected_answer: both
  notes: The Google Ads Transparency Center and the Google BigQuery dataset display the targeting criteria set by advertisers for ads labeled as political that were served to users in the UK, including demographic information and geographic locations.
  notes_pt: O Centro de Transparência do Google Ads e o conjunto de dados do Google BigQuery exibem os critérios de segmentação definidos pelos anunciantes para anúncios rotulados como políticos veiculados a usuários no Reino Unido, incluindo informações demográficas e localizações geográficas.
- code: AD_OC32
  selected_answer: 'no'
  notes: The Google Ads Transparency Center and the Google BigQuery dataset provide data on the number of impressions in the UK for ads labeled as political, but not at a sufficiently granular level.
  notes_pt: O Centro de Transparência do Google Ads e o conjunto de dados do Google BigQuery fornecem dados sobre o número de impressões no Reino Unido para anúncios rotulados como políticos, mas não em um nível suficientemente granular.
- code: AD_OC33
  selected_answer: 'no'
  notes: The Google Ads Transparency Center and the Google BigQuery dataset provide data on spending in the UK for ads labeled as political, but not at a sufficiently granular level.
  notes_pt: O Centro de Transparência do Google Ads e o conjunto de dados do Google BigQuery fornecem dados sobre gastos no Reino Unido com anúncios rotulados como políticos, mas não em um nível suficientemente granular.
