metadata:
  platform: Instagram
  region_code: EU
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: full
  notes: The [Meta Ad Library API](https://www.facebook.com/ads/library/api/) allows the retrieval of data on “ads of any type” that were delivered to users in the United Kingdom over the past year.
  notes_pt: A [Meta Ad Library API](https://www.facebook.com/ads/library/api/) permite a recuperação de dados sobre “anúncios de qualquer tipo” que foram entregues a usuários no Reino Unido no ano passado.
- code: AD_SC2
  selected_answer: partial
  notes: The [Meta Ad Library GUI](https://www.facebook.com/ads/library/) permits structured data extraction only for ads labeled and classified as political or issue ads in the United Kingdom. Other ads may be visible to users while they are actively being served on the platform, but their data cannot be extracted in a structured format.
  notes_pt: A [Meta Ad Library GUI](https://www.facebook.com/ads/library/) permite a extração estruturada de dados apenas para anúncios rotulados e classificados como anúncios políticos ou temáticos no Reino Unido. Outros anúncios podem ficar visíveis para os usuários enquanto estão sendo veiculados ativamente na plataforma, mas seus dados não podem ser extraídos em um formato estruturado.
- code: AD_SC3
  selected_answer: full
  notes: The [Meta Ad Library API](https://www.facebook.com/ads/library/api/) enables the retrieval of both active and inactive ads that were served to users in the United Kingdom over the past year.
  notes_pt: A [Meta Ad Library API](https://www.facebook.com/ads/library/api/) permite a recuperação de anúncios ativos e inativos que foram veiculados a usuários no Reino Unido no ano passado.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: The [Meta Ad Library GUI](https://www.facebook.com/ads/library/) allows users to view data on all ads that were served to users in the United Kingdom over the past year.
  notes_pt: A [Meta Ad Library GUI](https://www.facebook.com/ads/library/) permite que os usuários visualizem dados sobre todos os anúncios que foram veiculados para usuários no Reino Unido no ano passado.
- code: AD_OC2
  selected_answer: both
  notes: Access to the Meta Ad Library is free of charge.
  notes_pt: O acesso à Meta Ad Library é gratuito.
- code: AD_OC3
  selected_answer: both
  notes: It is possible to extract structured data on both ad creatives and authorship through the [Meta Ad Library API and GUI](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive).
  notes_pt: É possível extrair dados estruturados sobre criativos e autoria de anúncios por meio da [Meta Ad Library API and GUI](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive).
- code: AD_OC4
  selected_answer: 'yes'
  notes: The [Meta Ad Library API](https://developers.facebook.com/docs/facebook-login/guides/access-tokens#usertokens) provides a form of authentication that allows for renewal without the risk of data loss.
  notes_pt: A [Meta Ad Library API](https://developers.facebook.com/docs/facebook-login/guides/access-tokens#usertokens) fornece uma forma de autenticação que permite a renovação sem o risco de perda de dados.
- code: AD_OC5
  selected_answer: gui
  notes: The Meta Ad Library allows users to retrieve specific ads by their ID through the GUI, but this functionality is [not available through the API](/?active_status=active&ad_type=political_and_issue_ads&country=BR&is_targeted_country=false&media_type=all&q=1362986028521549&search_type=keyword_unordered).
  notes_pt: A Meta Ad Library permite que os usuários recuperem anúncios específicos por seu ID por meio da GUI, mas essa funcionalidade [not available through the API](/?active_status=active&ad_type=political_and_issue_ads&country=BR&is_targeted_country=false&media_type=all&q=1362986028521549&search_type=keyword_unordered).
- code: AD_OC6
  selected_answer: both
  notes: The Meta Ad Library enables the retrieval of specific advertisers by their unique ID through [both the GUI and the API](/?active_status=active&ad_type=political_and_issue_ads&country=BR&is_targeted_country=false&media_type=all&search_type=page&view_all_page_id=651655564979252).
  notes_pt: A Meta Ad Library permite a recuperação de anunciantes específicos por seu ID exclusivo por meio de [both the GUI and the API](/?active_status=active&ad_type=political_and_issue_ads&country=BR&is_targeted_country=false&media_type=all&search_type=page&view_all_page_id=651655564979252).
- code: AD_OC7
  selected_answer: both
  notes: It is possible to use keywords to perform searches through both the [Meta Ad Library GUI and API](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive).
  notes_pt: É possível usar palavras-chave para realizar pesquisas por meio da [Meta Ad Library GUI and API](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive).
- code: AD_OC8
  selected_answer: both
  notes: Timestamps are returned in Coordinated Universal Time (UTC) using the ISO 8601 standard. They are not automatically localized, and no locale information (such as language or region) is attached unless explicitly requested or inferred. Monetary values may appear in multiple currencies, but these are always expressed using standard ISO currency codes rather than localized formats.
  notes_pt: Os carimbos de data e hora são retornados em Tempo Universal Coordenado (UTC) usando o padrão ISO 8601. Eles não são localizados automaticamente e nenhuma informação de localidade (como idioma ou região) é anexada, a menos que seja explicitamente solicitada ou inferida. Os valores monetários podem aparecer em diversas moedas, mas são sempre expressos usando códigos de moeda ISO padrão em vez de formatos localizados.
completeness_answers:
- code: AD_OC9
  selected_answer: both
  notes: The Meta Ad Library consistently provides a unique identifier for all advertisers. However, when an advertiser does not have a Facebook page, the tool populates the page name field with the advertiser’s Instagram user ID and assigns the value “0” to the page ID field.
  notes_pt: A Meta Ad Library fornece consistentemente um identificador exclusivo para todos os anunciantes. No entanto, quando um anunciante não possui uma página no Facebook, a ferramenta preenche o campo de nome da página com o ID de usuário do Instagram do anunciante e atribui o valor “0” ao campo de ID da página.
- code: AD_OC10
  selected_answer: both
  notes: For ads labeled and classified as political or issue ads, the Meta Ad Library provides a disclosure text supplied by the advertiser indicating the funder’s declared name. However, for ads that were not originally labeled by advertisers and were subsequently reclassified by Meta, this information is not available.
  notes_pt: Para anúncios rotulados e classificados como anúncios políticos ou temáticos, a Meta Ad Library fornece um texto de divulgação fornecido pelo anunciante indicando o nome declarado do financiador. No entanto, para anúncios que não foram originalmente rotulados pelos anunciantes e foram posteriormente reclassificados pela Meta, esta informação não está disponível.
- code: AD_OC11
  selected_answer: both
  notes: The Meta Ad Library provides the period during which all ads were served to users in the United Kingdom.
  notes_pt: A Meta Ad Library fornece o período durante o qual todos os anúncios foram veiculados aos usuários no Reino Unido.
- code: AD_OC12
  selected_answer: 'no'
  notes: The Meta Ad Library does not provide any data on user engagement with ads.
  notes_pt: A Meta Ad Library não fornece quaisquer dados sobre o envolvimento do usuário com os anúncios.
- code: AD_OC13
  selected_answer: gui
  notes: The Meta Ad Library API [response schema](https://developers.facebook.com/docs/graph-api/reference/archived-ad/) does not indicate whether an advertiser has been verified by Meta, unlike the GUI, which explicitly displays this information.
  notes_pt: A API Meta Ad Library [response schema](https://developers.facebook.com/docs/graph-api/reference/archived-ad/) não indica se um anunciante foi verificado pelo Meta, ao contrário da GUI, que exibe explicitamente essas informações.
compliance_answers:
- code: AD_OC14
  selected_answer: both
  notes: Through the API, the Meta Ad Library indicates when an ad has been removed—provided that the appropriate parameters are set—while disclosing both the reason for removal and the ad’s final date of airing. The GUI likewise presents the reasons for an ad’s removal and its final airing date, and additionally allows users to view the ad content itself when it was removed for violating the company’s [Advertising Standards](https://transparency.meta.com/policies/ad-standards/) or labeling guidelines.
  notes_pt: Por meio da API, a Meta Ad Library indica quando um anúncio foi removido – desde que os parâmetros apropriados sejam definidos – ao mesmo tempo que divulga o motivo da remoção e a data final de exibição do anúncio. A GUI também apresenta os motivos para a remoção de um anúncio e sua data final de exibição, além de permitir que os usuários visualizem o próprio conteúdo do anúncio quando ele foi removido por violar os [Advertising Standards](https://transparency.meta.com/policies/ad-standards/) ou as diretrizes de rotulagem da empresa.
- code: AD_OC15
  selected_answer: gui
  notes: The Meta Ad Library API [response schema](https://developers.facebook.com/docs/graph-api/reference/archived-ad/) does not indicate whether ad content was created or manipulated using generative AI. The GUI, on the other hand, [explicitly discloses this information](https://www.facebook.com/government-nonprofits/blog/political-ads-ai-disclosure-policy) for ads labeled as political or issue ads, when such use is declared by the advertiser.
  notes_pt: A API Meta Ad Library [response schema](https://developers.facebook.com/docs/graph-api/reference/archived-ad/) não indica se o conteúdo do anúncio foi criado ou manipulado usando IA generativa. A GUI, por outro lado, [explicitly discloses this information](https://www.facebook.com/government-nonprofits/blog/political-ads-ai-disclosure-policy) para anúncios rotulados como políticos ou temáticos, quando tal uso é declarado pelo anunciante.
- code: AD_OC16
  selected_answer: both
  notes: Any user can access [Meta Ad Library’s documentation](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive).
  notes_pt: Qualquer usuário pode acessar [Meta Ad Library’s documentation](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive).
- code: AD_OC17
  selected_answer: both
  notes: The [Meta Ad Library documentation](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive) is clear and well documented with illustrative examples.
  notes_pt: A [Meta Ad Library documentation](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive) é clara e bem documentada com exemplos ilustrativos.
- code: AD_OC18
  selected_answer: 'no'
  notes: We did not identify any specific terms of service governing the use of the Meta Ad Library API or GUI.
  notes_pt: Não identificamos nenhum termo de serviço específico que rege o uso da API ou GUI da Meta Ad Library.
- code: AD_OC19
  selected_answer: both
  notes: Both the Meta Ad Library GUI and API documentation are fully available in English.
  notes_pt: Tanto a GUI da Meta Ad Library quanto a documentação da API estão totalmente disponíveis em inglês.
- code: AD_OC20
  selected_answer: 'yes'
  notes: The Meta Ad Library provides a [changelog](https://developers.facebook.com/docs/graph-api/changelog) detailing deprecation strategies and listing all upcoming changes, along with their respective release and expiration dates.
  notes_pt: A Meta Ad Library fornece um [changelog](https://developers.facebook.com/docs/graph-api/changelog) detalhando estratégias de descontinuação e listando todas as mudanças futuras, juntamente com suas respectivas datas de lançamento e expiração.
- code: AD_OC21
  selected_answer: 'yes'
  notes: The [Meta Ad Library API documentation](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive) provides a description of the response returned by the available endpoint.
  notes_pt: A [Meta Ad Library API documentation](https://developers.facebook.com/docs/graph-api/reference/v23.0/ads_archive) fornece uma descrição da resposta retornada pelo endpoint disponível.
- code: AD_OC22
  selected_answer: 'no'
  notes: Although Meta provides [rate-limiting documentation](https://developers.facebook.com/docs/graph-api/overview/rate-limiting/), it is not specific to the Ad Library API, which makes it difficult to estimate the effective quota available for collecting advertising data.
  notes_pt: Embora o Meta forneça [rate-limiting documentation](https://developers.facebook.com/docs/graph-api/overview/rate-limiting/), ela não é específica da API Ad Library, o que torna difícil estimar a cota efetiva disponível para coleta de dados publicitários.
consistency_answers:
- code: AD_OC23
  selected_answer: 'no'
  notes: The Meta Ad Library API does not disclose whether the content of ads labeled as political or issue ads was generated or manipulated using artificial intelligence.
  notes_pt: A API Meta Ad Library não divulga se o conteúdo dos anúncios rotulados como políticos ou temáticos foi gerado ou manipulado usando inteligência artificial.
- code: AD_OC24
  selected_answer: both
  notes: We conducted a test using the Meta Ad Library API by issuing five identical requests with the same parameters, saving each response to a separate file, and comparing whether all ads appeared consistently across the files. We observed that the full set of ads was present in every response. The GUI was likewise found to return consistent results across repeated queries.
  notes_pt: Conduzimos um teste usando a API Meta Ad Library emitindo cinco solicitações idênticas com os mesmos parâmetros, salvando cada resposta em um arquivo separado e comparando se todos os anúncios apareceram de forma consistente nos arquivos. Observamos que o conjunto completo de anúncios estava presente em todas as respostas. Da mesma forma, descobriu-se que a GUI retorna resultados consistentes em consultas repetidas.
- code: AD_OC25
  selected_answer: both
  notes: We conducted a test using the Meta Ad Library API with five requests, each employing different parameters, and compared the results against the specified filters. All responses were successfully validated, except for the “delivery by region” parameter, which returned null values for a few ads; however, all ads that included a value were consistent with the parameter. For the GUI, all displayed ads matched the applied filters, although we observed that using quotation marks in search terms allowed the export of more data than was indicated in the interface.
  notes_pt: Conduzimos um teste usando a API Meta Ad Library com cinco solicitações, cada uma empregando parâmetros diferentes, e comparamos os resultados com os filtros especificados. Todas as respostas foram validadas com sucesso, exceto o parâmetro “entrega por região”, que retornou valores nulos para alguns anúncios; entretanto, todos os anúncios que incluíam um valor eram consistentes com o parâmetro. Para a GUI, todos os anúncios exibidos corresponderam aos filtros aplicados, embora tenhamos observado que o uso de aspas nos termos de busca permitiu a exportação de mais dados do que o indicado na interface.
relevance_answers:
- code: AD_OC26
  selected_answer: both
  notes: The Meta Ad Library allows the application of a time period filter.
  notes_pt: A Meta Ad Library permite a aplicação de um filtro de período de tempo.
- code: AD_OC27
  selected_answer: gui
  notes: For ads served to users in the European Union, the Meta Ad Library GUI allows filtering by the categories “Housing”, “Employment”, “Financial Services”, and “Issues, Elections or Politics”.
  notes_pt: Para anúncios veiculados a usuários na União Europeia, a GUI da Meta Ad Library permite a filtragem pelas categorias “Habitação”, “Emprego”, “Serviços Financeiros” e “Questões, Eleições ou Política”.
- code: AD_OC28
  selected_answer: both
  notes: The Meta Ad Library supports the use of a geographic location filter for ads labeled as political or issue ads. However, some ads contain null values in the geographic location field, which complicates the validation of this information.
  notes_pt: A Meta Ad Library oferece suporte ao uso de um filtro de localização geográfica para anúncios rotulados como políticos ou temáticos. Porém, alguns anúncios contêm valores nulos no campo de localização geográfica, o que dificulta a validação desta informação.
accuracy_answers:
- code: AD_OC29
  selected_answer: both
  notes: The Meta Ad Library provides age and gender data for the audience reached by ads in the United Kingdom. However, it is important to note that, for ads labeled as political or issue ads, the demographic distribution field—which indicates the percentage of the audience population—may sometimes contain null values.
  notes_pt: A Meta Ad Library fornece dados de idade e sexo do público-alvo alcançado pelos anúncios no Reino Unido. No entanto, é importante observar que, para anúncios rotulados como anúncios políticos ou temáticos, o campo de distribuição demográfica – que indica a porcentagem da população do público-alvo – às vezes pode conter valores nulos.
- code: AD_OC30
  selected_answer: 'no'
  notes: Although the Meta Ad Library provides subnational geographic data on the audience reached by several ads labeled as political or issue ads, many others lack this information. No explanation is given for these omissions, and no explicit criteria can be inferred from the observed patterns.
  notes_pt: Embora a Meta Ad Library forneça dados geográficos subnacionais sobre o público-alvo alcançado por vários anúncios rotulados como anúncios políticos ou temáticos, muitos outros não possuem essa informação. Nenhuma explicação é dada para estas omissões e nenhum critério explícito pode ser inferido dos padrões observados.
- code: AD_OC31
  selected_answer: 'no'
  notes: The Meta Ad Library does not provide data for all targeting criteria that an advertiser can select in the United Kingdom.
  notes_pt: A Meta Ad Library não fornece dados para todos os critérios de segmentação que um anunciante pode selecionar no Reino Unido.
- code: AD_OC32
  selected_answer: both
  notes: The Meta Ad Library provides data on the total number of users reached by each ad in the United Kingdom.
  notes_pt: A Meta Ad Library fornece dados sobre o número total de usuários alcançados por cada anúncio no Reino Unido.
- code: AD_OC33
  selected_answer: 'no'
  notes: The Meta Ad Library provides data on [ad spending](https://www.facebook.com/ads/library/api/) for ads labeled as political or issue ads, but not at a sufficiently granular level.
  notes_pt: A Meta Ad Library fornece dados sobre [ad spending](https://www.facebook.com/ads/library/api/) para anúncios rotulados como anúncios políticos ou temáticos, mas não em um nível suficientemente granular.
