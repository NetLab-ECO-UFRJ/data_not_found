metadata:
  platform: YouTube
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: In theory, it is possible to access data on ads labeled as political that were served in Brazil from the [Google Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) via [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br). However, [as Google banned political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), this feature does not return up-to-date data.
  notes_pt: Em teoria, é possível acessar dados de anúncios rotulados como políticos veiculados no Brasil a partir de [Google Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) via [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br). Porém, [as Google banned political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), esse recurso não retorna dados atualizados.
- code: AD_SC2
  selected_answer: 'no'
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), a web-based interface that allows users to search for and view ads across Google products, including YouTube. The tool lets users filter results by advertiser, date range, region, and ad format to explore advertising content. However, in Brazil, the data export feature is limited to ads labeled as political that were shown to users in the country. [As Google banned political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), this feature does not return up-to-date ad data.
  notes_pt: O Google fornece o [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), uma interface baseada na Web que permite aos usuários pesquisar e visualizar anúncios em produtos do Google, incluindo o YouTube. A ferramenta permite que os usuários filtrem os resultados por anunciante, período, região e formato do anúncio para explorar o conteúdo publicitário. No entanto, no Brasil, o recurso de exportação de dados é limitado a anúncios rotulados como políticos que foram exibidos aos usuários no país. [As Google banned political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), esse recurso não retorna dados de anúncios atualizados.
- code: AD_SC3
  selected_answer: 'no'
  notes: It is not possible to extract structured, up-to-date data on ads served to users in Brazil through either the [Google Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) or [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br).
  notes_pt: Não é possível extrair dados estruturados e atualizados sobre anúncios veiculados para usuários no Brasil por meio de [Google Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR) ou [Google BigQuery](https://cloud.google.com/bigquery?hl=pt_br).
accessibility_answers:
- code: AD_OC1
  selected_answer: partial
  notes: Google provides the [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), a web-based interface that allows users to search for and view ads across Google products, including YouTube. It includes ads from verified advertisers shown within the past 365 days, as well as ads from unverified advertisers in Europe and Turkey. As a result, availability for Brazilian users is more limited due to restrictions on unverified advertisers.
  notes_pt: O Google fornece o [Ads Transparency Center](https://adstransparency.google.com/?hl=pt-BR&region=BR), uma interface baseada na Web que permite aos usuários pesquisar e visualizar anúncios em produtos do Google, incluindo o YouTube. Inclui anúncios de anunciantes verificados exibidos nos últimos 365 dias, bem como anúncios de anunciantes não verificados na Europa e na Turquia. Com isso, a disponibilidade para usuários brasileiros é mais limitada devido às restrições a anunciantes não verificados.
- code: AD_OC2
  selected_answer: gui
  notes: The Google Ads Transparency Center web interface is publicly available and free to use, with no payment or subscription required. However, following [Google’s ban on political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), there are no longer any programmatic means of extracting ad data for the country through the Ads Transparency Center or Google BigQuery.
  notes_pt: A interface da web da Central de transparência do Google Ads está disponível publicamente e é de uso gratuito, sem necessidade de pagamento ou assinatura. No entanto, após [Google’s ban on political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), não há mais meios programáticos de extrair dados de anúncios para o país por meio do Ads Transparency Center ou do Google BigQuery.
- code: AD_OC3
  selected_answer: 'no'
  notes: It is not possible to extract structured data on ads served in Brazil through the Ads Transparency Center or Google BigQuery, as availability is limited to political ads that were shown in the country until mid-2024.
  notes_pt: Não é possível extrair dados estruturados sobre anúncios veiculados no Brasil por meio do Ads Transparency Center ou do Google BigQuery, pois a disponibilidade é limitada a anúncios políticos que foram veiculados no país até meados de 2024.
- code: AD_OC4
  selected_answer: 'no'
  notes: Following [Google’s ban on political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), there are no longer any programmatic means of extracting ad data for the country through the Ads Transparency Center or Google BigQuery.
  notes_pt: Após [Google’s ban on political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), não há mais meios programáticos de extrair dados de anúncios do país por meio do Ads Transparency Center ou do Google BigQuery.
- code: AD_OC5
  selected_answer: gui
  notes: It is possible to retrieve data for a specific ad through the Google Ads Transparency Center. Although the interface does not allow users to search for an ad by its ID, a specific ad can be accessed directly via its URL, which can be easily formatted.
  notes_pt: É possível recuperar dados de um anúncio específico por meio da Central de Transparência do Google Ads. Embora a interface não permita que os usuários pesquisem um anúncio pelo seu ID, um anúncio específico pode ser acessado diretamente por meio de sua URL, que pode ser facilmente formatada.
- code: AD_OC6
  selected_answer: gui
  notes: The Google Ads Transparency Center allows users to search by advertiser name or target domain to view ads from verified advertisers. However, advertiser pages cannot be retrieved if verification is incomplete or if no ads were shown in the past 365 days. Moreover, it is not possible to extract structured data on ads served in Brazil through the Ads Transparency Center or Google BigQuery, as availability is limited to political ads that were shown in the country until mid-2024.
  notes_pt: A Central de Transparência do Google Ads permite que os usuários pesquisem pelo nome do anunciante ou domínio de destino para visualizar anúncios de anunciantes verificados. No entanto, as páginas do anunciante não poderão ser recuperadas se a verificação estiver incompleta ou se nenhum anúncio tiver sido exibido nos últimos 365 dias. Além disso, não é possível extrair dados estruturados sobre anúncios veiculados no Brasil por meio do Ads Transparency Center ou do Google BigQuery, pois a disponibilidade é limitada a anúncios políticos que foram veiculados no país até meados de 2024.
- code: AD_OC7
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not allow ads to be retrieved using search terms.
  notes_pt: A Central de Transparência do Google Ads não permite que anúncios sejam recuperados usando termos de pesquisa.
- code: AD_OC8
  selected_answer: 'no'
  notes: The Google Ads Transparency Center displays data, such as dates, using locale-specific formats. For example, the interface may show “12 de nov. de 2025”, which follows Portuguese localization conventions. This indicates that data presentation is localized based on the user’s region or language settings rather than being standardized or locale-neutral.
  notes_pt: A Central de Transparência do Google Ads exibe dados, como datas, usando formatos específicos de localidade. Por exemplo, a interface pode mostrar “12 de novembro de 2025”, que segue as convenções de localização em português. Isso indica que a apresentação dos dados é localizada com base na região ou nas configurações de idioma do usuário, em vez de ser padronizada ou neutra em termos de localidade.
completeness_answers:
- code: AD_OC9
  selected_answer: gui
  notes: The Google Ads Transparency Center discloses the page name and unique identifier associated with each advertiser. It is also possible to access all available ads from a specific advertiser on a dedicated page.
  notes_pt: A Central de Transparência do Google Ads divulga o nome da página e o identificador exclusivo associado a cada anunciante. Também é possível acessar todos os anúncios disponíveis de um anunciante específico em uma página dedicada.
- code: AD_OC10
  selected_answer: 'no'
  notes: The Google Ads Transparency Center only discloses the advertiser’s name and does not provide additional information about sponsors or funders.
  notes_pt: A Central de Transparência do Google Ads divulga apenas o nome do anunciante e não fornece informações adicionais sobre patrocinadores ou financiadores.
- code: AD_OC11
  selected_answer: 'no'
  notes: The Google Ads Transparency Center discloses the start and end dates for ads labeled as political, which were banned from Google platforms in Brazil in mid-2024. For all other ads, it only provides the last date on which the ad was shown and does not include detailed information on the full period during which the ad was served.
  notes_pt: A Central de Transparência do Google Ads divulga as datas de início e término dos anúncios rotulados como políticos, que foram banidos das plataformas do Google no Brasil em meados de 2024. Para todos os outros anúncios, fornece apenas a última data em que o anúncio foi exibido e não inclui informações detalhadas sobre o período completo durante o qual o anúncio foi veiculado.
- code: AD_OC12
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any data on user engagement with ads.
  notes_pt: A Central de Transparência do Google Ads não fornece dados sobre o envolvimento do usuário com os anúncios.
- code: AD_OC13
  selected_answer: gui
  notes: In Brazil, the Google Ads Transparency Center only discloses ads from verified advertisers.
  notes_pt: No Brasil, a Central de Transparência do Google Ads divulga apenas anúncios de anunciantes verificados.
compliance_answers:
- code: AD_OC14
  selected_answer: 'no'
  notes: In Brazil, the Google Ads Transparency Center only discloses information on moderated ads labeled as political, including the reason for moderation and the date on which they were last served. However, this is of limited practical value, as the political ads dataset has not been updated since mid-2024 following the ban on political ads in Brazil.
  notes_pt: No Brasil, a Central de Transparência do Google Ads divulga apenas informações sobre anúncios moderados e rotulados como políticos, incluindo o motivo da moderação e a data em que foram veiculados pela última vez. No entanto, isto tem valor prático limitado, uma vez que o conjunto de dados de anúncios políticos não é atualizado desde meados de 2024, após a proibição de anúncios políticos no Brasil.
- code: AD_OC15
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any information regarding the use of generative AI in the creation or manipulation of ad content.
  notes_pt: A Central de Transparência do Google Ads não fornece nenhuma informação sobre o uso de IA generativa na criação ou manipulação de conteúdo publicitário.
