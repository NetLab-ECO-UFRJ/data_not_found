  notes_pt: Executamos várias consultas paralelas na Central de transparência de anúncios e confirmamos que os resultados eram consistentes com os parâmetros e filtros especificados.
relevance_answers:
- code: AD_OC26
  selected_answer: gui
  notes: The Google Ads Transparency Center supports filtering ads by date after a specific advertiser or target domain has been selected.
  notes_pt: A Central de Transparência do Google Ads oferece suporte à filtragem de anúncios por data após a seleção de um anunciante ou domínio de destino específico.
- code: AD_OC27
  selected_answer: 'no'
  notes: The Google Ads Transparency Center only distinguishes between ads labeled as political and non-political and does not provide filters based on ad categories. However, this distinction is of limited practical value, as the political ads dataset has not been updated since mid-2024 following the ban on political ads in Brazil.
  notes_pt: A Central de Transparência do Google Ads distingue apenas entre anúncios rotulados como políticos e não políticos e não fornece filtros com base em categorias de anúncios. No entanto, esta distinção tem valor prático limitado, uma vez que o conjunto de dados de anúncios políticos não é atualizado desde meados de 2024, após a proibição de anúncios políticos no Brasil.
- code: AD_OC28
  selected_answer: 'no'
  notes: Filtering is only available at the country level in the Google Ads Transparency Center.
  notes_pt: A filtragem está disponível apenas em nível de país na Central de transparência do Google Ads.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any age or gender information about an ad’s audience.
  notes_pt: A Central de Transparência do Google Ads não fornece informações de idade ou sexo sobre o público-alvo de um anúncio.
- code: AD_OC30
  selected_answer: 'no'
  notes: The Google Ads Transparency Center does not provide any subnational location data about an ad’s audience.
  notes_pt: A Central de Transparência do Google Ads não fornece dados de localização subnacional sobre o público-alvo de um anúncio.
- code: AD_OC31
  selected_answer: 'no'
  notes: The Google Ads Transparency Center displays the targeting criteria set by advertisers for ads labeled as political that were served to users in Brazil, including demographic information, geographic locations, and so-called contextual signals. However, this is of limited practical value, as the political ads dataset has not been updated since mid-2024 following the ban on political ads in Brazil.
  notes_pt: A Central de Transparência do Google Ads exibe os critérios de segmentação definidos pelos anunciantes para anúncios rotulados como políticos veiculados a usuários no Brasil, incluindo informações demográficas, localizações geográficas e os chamados sinais contextuais. No entanto, isto tem valor prático limitado, uma vez que o conjunto de dados de anúncios políticos não é atualizado desde meados de 2024, após a proibição de anúncios políticos no Brasil.
- code: AD_OC32
  selected_answer: 'no'
  notes: The Google Ads Transparency Center provides data on the number of impressions in Brazil for ads labeled as political, but not at a sufficiently granular level. Even this is of limited practical value, as the political ads dataset has not been updated since mid-2024 following the ban on political ads in Brazil.
  notes_pt: A Central de Transparência do Google Ads fornece dados sobre o número de impressões no Brasil de anúncios rotulados como políticos, mas não em um nível suficientemente granular. Mesmo isto tem valor prático limitado, uma vez que o conjunto de dados de anúncios políticos não é atualizado desde meados de 2024, após a proibição de anúncios políticos no Brasil.
- code: AD_OC33
  selected_answer: 'no'
  notes: The Google Ads Transparency Center provides data on spending in Brazil for ads labeled as political, but not at a sufficiently granular level. Even this is of limited practical value, as the political ads dataset has not been updated since mid-2024 following the ban on political ads in Brazil.
  notes_pt: A Central de Transparência do Google Ads fornece dados sobre gastos no Brasil com anúncios rotulados como políticos, mas não em um nível suficientemente granular. Mesmo isto tem valor prático limitado, uma vez que o conjunto de dados de anúncios políticos não é atualizado desde meados de 2024, após a proibição de anúncios políticos no Brasil.
