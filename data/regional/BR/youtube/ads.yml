  notes_pt: Após [Google’s ban on political ads in Brazil in 2024](https://netlab.eco.ufrj.br/post/nota-tecnica-google), não há mais meios programáticos de extrair dados de anúncios do país por meio do Ads Transparency Center ou do Google BigQuery. No entanto, como os dados do anúncio seriam extraídos programaticamente de um banco de dados relacional por meio do Google BigQuery usando consultas SQL, não há pontos de extremidade específicos do conjunto de dados a serem explorados.
