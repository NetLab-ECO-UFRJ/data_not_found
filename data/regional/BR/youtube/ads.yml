- code: AD_OC24
  selected_answer: gui
  notes: We ran multiple parallel queries in the Ads Transparency Center and confirmed that the results were consistent and reproducible.
  notes_pt: Executamos várias consultas paralelas na Central de transparência de anúncios e confirmamos que os resultados eram consistentes e reproduzíveis.
- code: AD_OC25
  selected_answer: gui
