- code: AD_OC16
  selected_answer: 'no'
  notes: >-
    No documentation for the Pinterest Ads Repository could be identified. The repository’s GUI only references a [broken link](https://developers.pinterest.com/docs/api/v4/#tag/ads_repository) that previously directed users to deprecated versions of the Pinterest API, which included endpoints for collecting ad data.
  notes_pt: >-
    Nenhuma documentação do Pinterest Ads Repository foi identificada. A GUI
    do repositório faz referência apenas a um [broken
    link](https://developers.pinterest.com/docs/api/v4/#tag/ads_repository)
    que anteriormente direcionava os usuários para versões obsoletas da API
    do Pinterest, que incluíam endpoints para coleta de dados de anúncios.
