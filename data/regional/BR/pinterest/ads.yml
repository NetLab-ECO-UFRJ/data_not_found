  notes_pt: >-
    Não identificamos nenhum anúncio sinalizado como removido ou moderado
    durante nossa teste do repositório de anúncios do Pinterest.
- code: AD_OC15
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not provide any information regarding
