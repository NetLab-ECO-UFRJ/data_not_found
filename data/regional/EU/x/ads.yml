special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: '[According to X/Twitter](https://help.x.com/en/rules-and-policies/dsa-vetted-researchers), access to data on ads delivered in the European Union under Article 40 of the Digital Services Act (DSA) is available through the X API for researchers. However, at the time of the assessment, access had not been granted. Our application remained pending without any response from the platform within a reasonable timeframe, and no reasons for non-approval were provided.'
  notes_pt: '[According to X/Twitter](https://help.x.com/en/rules-and-policies/dsa-vetted-researchers), o acesso aos dados sobre anúncios veiculados na União Europeia ao abrigo do Artigo 40 da Lei dos Serviços Digitais (DSA) está disponível através da API X para investigadores. No entanto, no momento da avaliação, o acesso não tinha sido concedido. Nosso pedido permaneceu pendente sem qualquer resposta da plataforma dentro de um prazo razoável, e nenhum motivo para a não aprovação foi fornecido.'
- code: AD_SC2
  selected_answer: 'no'
  notes: The [X Ads Repository](https://ads.twitter.com/ads-repository) was launched in 2023 to comply with the requirements of the European Union’s Digital Services Act (DSA). For advertisements served in the EU, the repository is intended to provide key information on funding, targeting, and reach through [downloadable comma-separated values (CSV) files](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency). This constitutes the only available access point for ad data, as X does not display this information directly in the graphical user interface. Despite multiple attempts, we were unable to extract any substantive data, even though the documentation indicates that such extraction should be technically possible. We tested several prominent advertisers—including Amazon, Apple, and Netflix—across multiple EU countries (France, Germany, and Belgium) and across a range of time filters (custom dates, today, yesterday, past 7 days, current quarter, previous quarter, and past year). In all cases, the downloads produced CSV files containing only headers and no records. These findings are consistent with [recent conclusions by the European Commission](https://ec.europa.eu/commission/presscorner/detail/en/ip_25_2934), which fined X for non-compliance with the DSA, including excessive delays in processing data requests from its Ad Repository, thereby undermining its intended transparency function.
  notes_pt: O [X Ads Repository](https://ads.twitter.com/ads-repository) foi lançado em 2023 para cumprir os requisitos da Lei de Serviços Digitais (DSA) da União Europeia. Para anúncios veiculados na UE, o repositório destina-se a fornecer informações importantes sobre financiamento, direcionamento e alcance por meio do [downloadable comma-separated values (CSV) files](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency). Este constitui o único ponto de acesso disponível para dados de anúncios, já que X não exibe essas informações diretamente na interface gráfica do usuário. Apesar das múltiplas tentativas, não conseguimos extrair quaisquer dados substantivos, embora a documentação indique que tal extração deveria ser tecnicamente possível. Testamos vários anunciantes proeminentes – incluindo Amazon, Apple e Netflix – em vários países da UE (França, Alemanha e Bélgica) e através de uma série de filtros de tempo (datas personalizadas, hoje, ontem, últimos 7 dias, trimestre atual, trimestre anterior e ano passado). Em todos os casos, os downloads produziram arquivos CSV contendo apenas cabeçalhos e nenhum registro. Estas conclusões são consistentes com [recent conclusions by the European Commission](https://ec.europa.eu/commission/presscorner/detail/en/ip_25_2934), que multou X por não conformidade com o DSA, incluindo atrasos excessivos no processamento de pedidos de dados do seu repositório de anúncios, prejudicando assim a função de transparência pretendida.
- code: AD_SC3
  selected_answer: 'no'
  notes: This could not be verified due to the lack of API access at the time of the assessment, as well as repeated failures to extract any data from the graphical interface despite multiple attempts.
  notes_pt: Isso não pôde ser verificado devido à falta de acesso à API no momento da avaliação, bem como a repetidas falhas na extração de quaisquer dados da interface gráfica, apesar das múltiplas tentativas.
accessibility_answers:
- code: AD_OC1
  selected_answer: 'no'
  notes: In principle, this item could be met through the CSV files generated in the graphical interface. However, the feature was not functioning correctly at the time of the assessment (December 2025), as all searches returned empty files containing only headers. It could also theoretically be met via the API, but this could not be verified because access had not been granted.
  notes_pt: A princípio este item poderia ser atendido através dos arquivos CSV gerados na interface gráfica. Porém, o recurso não estava funcionando corretamente no momento da avaliação (dezembro de 2025), pois todas as buscas retornaram arquivos vazios contendo apenas cabeçalhos. Teoricamente, também poderia ser atendido por meio da API, mas não foi possível verificar porque o acesso não foi concedido.
