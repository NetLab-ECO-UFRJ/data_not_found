- code: AD_OC13
  selected_answer: 'no'
  notes: Neither the X Ads Repository GUI nor the [API documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency) indicates whether advertisers were verified at the time their ads were served. This could not be independently verified due to the lack of API access at the time of the assessment and the repeated inability to extract any data from the graphical interface. More broadly, X departs from common online verification-labelling practices by treating verification as a paid feature, [which limits its reliability as an indicator of authenticity on the platform](https://ec.europa.eu/commission/presscorner/detail/en/ip_24_3761).
  notes_pt: Nem a GUI do X Ads Repository nem o [API documentation](https://business.x.com/en/help/ads-policies/product-policies/ads-transparency) indicam se os anunciantes foram verificados no momento em que seus anúncios foram veiculados. Isto não pôde ser verificado de forma independente devido à falta de acesso à API no momento da avaliação e à repetida incapacidade de extrair quaisquer dados da interface gráfica. De forma mais ampla, o X se afasta das práticas comuns de rotulagem de verificação on-line ao tratar a verificação como um recurso pago, [which limits its reliability as an indicator of authenticity on the platform](https://ec.europa.eu/commission/presscorner/detail/en/ip_24_3761).
