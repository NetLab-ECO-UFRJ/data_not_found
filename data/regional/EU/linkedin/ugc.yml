metadata:
  platform: LinkedIn
  region_code: EU
  scope: UGC
  evaluation_date: 2025-11
special-criteria_answers:
- code: UGC_SC1
  selected_answer: researchers_only
  notes: LinkedIn provides a [Beta Researcher Access Program](https://www.linkedin.com/help/linkedin/answer/a1645616) to comply with their legal requirements under article 40 of the European Union's Digital Services Act (DSA), which includes an API access.
  notes_pt: O LinkedIn fornece um [Beta Researcher Access Program](https://www.linkedin.com/help/linkedin/answer/a1645616) para cumprir os requisitos legais previstos no artigo 40 da Lei de Serviços Digitais (DSA) da União Europeia, que inclui acesso à API.
- code: UGC_SC2
  selected_answer: 'no'
  notes: We submitted a request to the LinkedIn Researcher Access Program in accordance with the [platform’s documentation](https://www.linkedin.com/help/linkedin/answer/a1645616), but we never received any response. As a result, we cannot guarantee the proper functioning of its features or the quality of the data it returns, due to the impossibility of conducting empirical tests.
  notes_pt: Enviamos uma solicitação ao Programa de Acesso para Pesquisadores do LinkedIn de acordo com o [platform’s documentation](https://www.linkedin.com/help/linkedin/answer/a1645616), mas nunca recebemos nenhuma resposta. Como resultado, não podemos garantir o bom funcionamento das suas funcionalidades ou a qualidade dos dados que devolve, devido à impossibilidade de realização de testes empíricos.
- code: UGC_SC3
  selected_answer: researchers_only
  notes: The LinkedIn Researcher Access Program does not impose any fees on researchers.
  notes_pt: O Programa de Acesso para Pesquisadores do LinkedIn não impõe nenhuma taxa aos pesquisadores.
- code: UGC_SC4
  selected_answer: 'no'
  notes: The platform does not provide a graphical interface for extracting structured data on public user-generated content data.
  notes_pt: A plataforma não fornece uma interface gráfica para extrair dados estruturados sobre dados de conteúdo público gerado pelo usuário.
