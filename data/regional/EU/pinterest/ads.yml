- code: AD_OC24
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository GUI was found to return consistent results
    across repeated queries.
  notes_pt: >-
    Descobriu-se que a GUI do Pinterest Ads Repository retorna resultados consistentes em
    consultas repetidas.
- code: AD_OC25
  selected_answer: gui
  notes: >-
    Results obtained from the Pinterest Ads Repository were consistent with
    the filters and parameters defined throughout the testing process.
  notes_pt: >-
    Os resultados obtidos no Pinterest Ads Repository foram consistentes com os filtros e
