relevance_answers:
- code: AD_OC26
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository allows users to filter results by
    specifying ad delivery start and end dates. However, the maximum
    allowable interval between these dates is 30 days, which substantially
    limits research and inquiry capabilities.
  notes_pt: >-
    O Pinterest Ads Repository permite aos usuários filtrar os resultados especificando as
    datas de início e término da entrega do anúncio. Contudo, o intervalo máximo permitido
    entre estas datas é de 30 dias, o que limita substancialmente as capacidades de
    investigação e investigação.
- code: AD_OC27
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository allows users to filter results by thematic
    categories, including “Animals”, “Architecture”, “Arts”, “Health”, and
    others.
  notes_pt: >-
    O Pinterest Ads Repository permite aos usuários filtrar os resultados por categorias
    temáticas, incluindo “Animais”, “Arquitetura”, “Artes”, “Saúde” e outras.
- code: AD_OC28
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository only allows data to be filtered by country.
  notes_pt: >-
    O Pinterest Ads Repository só permite que os dados sejam filtrados por país.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not provide any age or gender
    information about an ad’s audience.
  notes_pt: >-
    O Pinterest Ads Repository não fornece nenhuma informação de idade ou sexo sobre o
    público de um anúncio.
- code: AD_OC30
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not provide any subnational location
    data about an ad’s audience.
  notes_pt: >-
    O Pinterest Ads Repository não fornece dados de localização subnacionais sobre o público
    de um anúncio.
- code: AD_OC31
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository provides visibility into the audience
    targeting criteria defined by advertisers, such as age, gender,
    interests, postal codes, geographic areas, keywords, and other
    parameters.
  notes_pt: >-
    O Pinterest Ads Repository fornece visibilidade dos critérios de segmentação de público
    definidos pelos anunciantes, como idade, sexo, interesses, códigos postais, áreas
    geográficas, palavras-chave e outros parâmetros.
- code: AD_OC32
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository provides data on ad impressions, but not a
    sufficiently granular level.
  notes_pt: >-
    O Pinterest Ads Repository fornece dados sobre impressões de anúncios, mas não em um
    nível suficientemente granular.
- code: AD_OC33
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not provide data on ad spending.
  notes_pt: >-
    O Pinterest Ads Repository não fornece dados sobre gastos com publicidade.
