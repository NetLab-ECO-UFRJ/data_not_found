metadata:
  platform: Pinterest
  region_code: Global
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: >-
    Although Pinterest maintains a public Ads Repository, it does not make this data available through an Ads Repository API. [Previous versions of the Pinterest API](https://assets.mofoprod.net/network/documents/Full_Disclosure_Stress_Testing_Tech_Platforms_Ad_Repositories_3FepU2u.pdf), deprecated as of 2022, included endpoints for accessing advertising data, but this capability is not present in the current [Pinterest API v5](https://developers.pinterest.com/docs/api/v5/introduction/?).
  notes_pt: >-
    Embora o Pinterest mantenha um repositório de anúncios público, ele não disponibiliza
    esses dados por meio de uma API do repositório de anúncios. [Previous versions of the
    Pinterest
    API](https://assets.mofoprod.net/network/documents/Full_Disclosure_Stress_Testing_Tech_Platforms_Ad_Repositories_3FepU2u.pdf),
    obsoleto em 2022, incluía endpoints para acessar dados de publicidade, mas esse recurso
    não está presente no [Pinterest API
    v5](https://developers.pinterest.com/docs/api/v5/introduction/?) atual.
- code: AD_SC2
  selected_answer: 'no'
  notes: >-
    Although Pinterest maintains a public Ads Repository, it does not allow
    data to be extracted in a structured format, limiting access to viewing
    ad content only.
  notes_pt: >-
    Embora o Pinterest mantenha um Repositório de Anúncios público, ele não permite a
    extração de dados em formato estruturado, limitando o acesso apenas à visualização do
    conteúdo do anúncio.
- code: AD_SC3
  selected_answer: 'no'
  notes: >-
    Although Pinterest maintains a public Ads Repository, it does not allow
    data to be extracted in a structured format, either through its
    graphical user interface or via an API, limiting access to viewing ad
    content only.
  notes_pt: >-
    Embora o Pinterest mantenha um Repositório de Anúncios público, ele não permite a
    extração de dados em formato estruturado, seja por meio de sua interface gráfica de
    usuário ou por meio de uma API, limitando o acesso apenas à visualização do conteúdo do
    anúncio.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: >-
    The [Pinterest Ads Repository](https://ads.pinterest.com/ads-repository/) publicly provides, through its GUI, all ads served to users in the European Union in the last year, both active and inactive.
  notes_pt: >-
    O [Pinterest Ads Repository](https://ads.pinterest.com/ads-repository/) disponibiliza
    publicamente, através da sua GUI, todos os anúncios veiculados aos usuários na União
    Europeia no último ano, tanto ativos quanto inativos.
- code: AD_OC2
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository is freely accessible, but no API exists,
    and access is limited to its GUI.
  notes_pt: >-
    O Pinterest Ads Repository é de acesso gratuito, mas não existe API e o acesso é
    limitado à sua GUI.
- code: AD_OC3
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not allow the extraction of structured
    data.
  notes_pt: >-
    O Pinterest Ads Repository não permite a extração de dados estruturados.
- code: AD_OC4
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository offers no API access under any
    circumstances.
  notes_pt: >-
    O Pinterest Ads Repository não oferece acesso à API em nenhuma circunstância.
- code: AD_OC5
  selected_answer: gui
  notes: >-
    Although the Pinterest Ads Repository does not allow users to search for an ad by its ID, a specific ad can be accessed directly via its URL, which can be easily formatted.
  notes_pt: >-
    Embora o Pinterest Ads Repository não permita que os usuários pesquisem um anúncio por
    seu ID, um anúncio específico pode ser acessado diretamente por meio de seu URL, que
    pode ser facilmente formatado.
- code: AD_OC6
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository allows users to retrieve ads by selecting
    specific advertisers.
  notes_pt: >-
    O Pinterest Ads Repository permite aos usuários recuperar anúncios selecionando
    anunciantes específicos.
- code: AD_OC7
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not allow ads to be retrieved using
    search terms.
  notes_pt: >-
    O Pinterest Ads Repository não permite que anúncios sejam recuperados usando termos de
    pesquisa.
- code: AD_OC8
  selected_answer: gui
  notes: >-
    The Pinterest Ads Repository GUI displays dates in ISO 8601 format
    (YYYY-MM-DD).
  notes_pt: >-
    A GUI do Pinterest Ads Repository exibe datas no formato ISO 8601 (AAAA-MM-DD).
completeness_answers:
- code: AD_OC9
  selected_answer: gui
  notes: >-
    Advertiser identities are accurately disclosed in the Pinterest Ads
    Repository.
  notes_pt: >-
    As identidades dos anunciantes são divulgadas com precisão no Pinterest Ads Repository.
- code: AD_OC10
  selected_answer: 'no'
  notes: >-
    The Pinterest Ads Repository does not disclose who paid for ads served
