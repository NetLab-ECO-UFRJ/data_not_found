metadata:
  platform: Snapchat
  scope: ADS
  evaluation_date: 2025-12
special-criteria_answers:
- code: AD_SC1
  selected_answer: 'no'
  notes: 'In the EU, Snapchat provides the [Ads Gallery API](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/Introduction) for collecting data on ads and commercial content, such as sponsored posts. In practice, however, its functionality is limited and difficult to use. Despite multiple attempts by different researchers, the API could not be successfully tested and consistently returned a “too many requests” error. In principle, the API should offer at least one endpoint for accessing public advertising data, but in practice this functionality does not appear to be operational. Moreover, the API’s scope is narrow and advertiser-centric: queries must be made using an advertiser’s Snapchat ID rather than a brand name or creator, which substantially restricts discoverability. As a result, the API is not suitable for broad research use and does not support comprehensive or historical extraction of advertising content served in the EU. Available filters are limited to advertiser, geography, and time period, with historical access restricted to a maximum of 12 months.'
  notes_pt: 'Na UE, o Snapchat fornece o [Ads Gallery API](https://developers.snap.com/api/marketing-api/Ads-Gallery-Api/Introduction) para coleta de dados sobre anúncios e conteúdo comercial, como postagens patrocinadas. Na prática, porém, sua funcionalidade é limitada e difícil de usar. Apesar das múltiplas tentativas de diferentes pesquisadores, a API não pôde ser testada com êxito e retornou consistentemente um erro de “muitas solicitações”. Em princípio, a API deveria oferecer pelo menos um endpoint para acesso a dados publicitários públicos, mas na prática esta funcionalidade não parece estar operacional. Além disso, o escopo da API é restrito e centrado no anunciante: as consultas devem ser feitas usando o ID Snapchat do anunciante, em vez de um nome de marca ou criador, o que restringe substancialmente a descoberta. Como resultado, a API não é adequada para um uso amplo em pesquisa e não suporta a extração abrangente ou histórica de conteúdos publicitários veiculados na UE. Os filtros disponíveis são limitados a anunciante, região geográfica e período de tempo, com acesso histórico restrito a no máximo 12 meses.'
- code: AD_SC2
  selected_answer: 'no'
  notes: Snapchat provides access to the [Snapchat Ads Gallery](https://adsgallery.snap.com), which appears to provide access to data on ads hich were delivered to users in the EU over the past 12 months. However, it is not possible to extract structured data from its GUI.
  notes_pt: O Snapchat fornece acesso ao [Snapchat Ads Gallery](https://adsgallery.snap.com), que parece fornecer acesso a dados sobre anúncios que foram entregues a usuários na UE nos últimos 12 meses. Porém, não é possível extrair dados estruturados de sua GUI.
- code: AD_SC3
  selected_answer: 'no'
  notes: As we were unable to test the functionalities of the Snapchat Ads Gallery API or to extract structured data from its GUI, verification was not possible.
  notes_pt: Como não conseguimos testar as funcionalidades da API Snapchat Ads Gallery ou extrair dados estruturados de sua GUI, a verificação não foi possível.
accessibility_answers:
- code: AD_OC1
  selected_answer: 'no'
  notes: While, in principle, the Snapchat Ads Gallery GUI allows users to view advertising content and related data served to users in the European Union over the past 12 months, multiple tests conducted independently by different researchers returned no results, rendering verification impossible.
  notes_pt: Embora, em princípio, a GUI da Snapchat Ads Gallery permita aos usuários visualizar conteúdos publicitários e dados relacionados servidos a usuários na União Europeia durante os últimos 12 meses, vários testes realizados de forma independente por diferentes pesquisadores não retornaram resultados, impossibilitando a verificação.
- code: AD_OC2
  selected_answer: both
  notes: Even though we were unable to make it function, either through the API or the GUI, access to the Snapchat Ads Gallery is free of charge.
  notes_pt: Embora não tenhamos conseguido fazê-lo funcionar, seja por meio da API ou da GUI, o acesso à Galeria de Anúncios do Snapchat é gratuito.
