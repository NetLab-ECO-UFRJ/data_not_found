  selected_answer: 'no'
  notes: Verification was not possible because API access tests consistently returned a “too many requests” error, and the GUI does not allow for structured data extraction.
  notes_pt: A verificação não foi possível porque os testes de acesso à API retornaram consistentemente um erro de “muitas solicitações” e a GUI não permite a extração estruturada de dados.
