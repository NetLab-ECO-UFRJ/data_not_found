metadata:
  platform: Tiktok
  region_code: EU
  scope: ADS
  evaluation_date: 2025-11
special-criteria_answers:
- code: AD_SC1
  selected_answer: full
  notes: The [TikTok Commercial Content Library API](https://developers.tiktok.com/products/commercial-content-api) allows approved researchers to extract structured data on ads published from October 1, 2022 onward. Ad data remains available for one year after the ad’s last delivery. Access is restricted and requires prior approval.
  notes_pt: O [TikTok Commercial Content Library API](https://developers.tiktok.com/products/commercial-content-api) permite que pesquisadores aprovados extraiam dados estruturados sobre anúncios publicados a partir de 1º de outubro de 2022. Os dados do anúncio permanecem disponíveis por um ano após a última entrega do anúncio. O acesso é restrito e requer aprovação prévia.
- code: AD_SC2
  selected_answer: 'no'
  notes: Although TikTok maintains a public ads repository for content served to EU and UK-based users, the [Commercial Content Library](https://library.tiktok.com/), it does not provide a way to extract data in a structured format, limiting access to viewing ad content only.
  notes_pt: Embora o TikTok mantenha um repositório público de anúncios para conteúdo servido a usuários baseados na UE e no Reino Unido, o [Commercial Content Library](https://library.tiktok.com/), ele não fornece uma maneira de extrair dados em um formato estruturado, limitando o acesso apenas à visualização do conteúdo do anúncio.
- code: AD_SC3
  selected_answer: full
  notes: It is possible to access both active and inactive ads through the TikTok Commercial Content Library, for up to one year after an ad’s last delivery. However, there is no API parameter that allows ads to be filtered by active or inactive status.
  notes_pt: É possível acessar anúncios ativos e inativos por meio da Biblioteca de conteúdo comercial do TikTok, por até um ano após a última entrega do anúncio. No entanto, não existe um parâmetro de API que permita filtrar os anúncios por status ativo ou inativo.
accessibility_answers:
- code: AD_OC1
  selected_answer: full
  notes: The [TikTok Commercial Content Library publicly provides](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library#3), through its GUI, all ads served to users in the EU and the UK in the last year, both active and inactive.
  notes_pt: O [TikTok Commercial Content Library publicly provides](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library#3), através de sua GUI, todos os anúncios veiculados para usuários na UE e no Reino Unido no último ano, tanto ativos quanto inativos.
- code: AD_OC2
  selected_answer: both
  notes: Both the TikTok Commercial Content Library GUI and API are publicly accessible. However, researchers must submit a request form explaining their intended use of the API and [obtain platform approval before gaining access](https://developers.tiktok.com/products/commercial-content-api).
  notes_pt: Tanto a GUI quanto a API da Biblioteca de Conteúdo Comercial TikTok são acessíveis publicamente. No entanto, os pesquisadores devem enviar um formulário de solicitação explicando o uso pretendido da API e do [obtain platform approval before gaining access](https://developers.tiktok.com/products/commercial-content-api).
- code: AD_OC3
  selected_answer: 'no'
  notes: The TikTok Commercial Content API does not provide substantive data about ad content beyond a link to view the video in the Commercial Content Library GUI via a browser. As a result, it is not possible to extract descriptions of video-based ads through the API. Additionally, the Commercial Content Library GUI does not support structured data extraction, limiting access to viewing ad content only.
  notes_pt: A API de conteúdo comercial do TikTok não fornece dados substantivos sobre o conteúdo do anúncio além de um link para visualizar o vídeo na GUI da biblioteca de conteúdo comercial por meio de um navegador. Como resultado, não é possível extrair descrições de anúncios baseados em vídeo através da API. Além disso, a GUI da Biblioteca de Conteúdo Comercial não oferece suporte à extração estruturada de dados, limitando o acesso apenas à visualização do conteúdo do anúncio.
- code: AD_OC4
  selected_answer: 'yes'
  notes: To use the TikTok Commercial Content API, an access token is required. This token can be created using the client credentials. It expires after approximately two hours but can be easily refreshed programmatically without affecting data collection.
  notes_pt: Para usar a API de conteúdo comercial do TikTok, é necessário um token de acesso. Este token pode ser criado usando as credenciais do cliente. Ele expira após aproximadamente duas horas, mas pode ser facilmente atualizado programaticamente sem afetar a coleta de dados.
- code: AD_OC5
  selected_answer: both
  notes: It is possible to retrieve data for a specific ad through both the TikTok Commercial Content Library GUI and API. The API provides a [`GET ad/detail/ endpoint`](https://developers.tiktok.com/doc/commercial-content-api-get-ad-details?enter_method=left_navigation) for this purpose. Although it is not possible to search for an ad by its ID in the interface, a specific ad can be accessed directly via its URL, which can be easily formatted.
  notes_pt: É possível recuperar dados de um anúncio específico por meio da GUI e da API da TikTok Commercial Content Library. A API fornece um [`GET ad/detail/ endpoint`](https://developers.tiktok.com/doc/commercial-content-api-get-ad-details?enter_method=left_navigation) para essa finalidade. Embora não seja possível buscar um anúncio pelo seu ID na interface, um anúncio específico pode ser acessado diretamente por meio de sua URL, que pode ser facilmente formatada.
- code: AD_OC6
  selected_answer: both
  notes: The TikTok Commercial Content Library allows users to retrieve ads by selecting or specifying particular advertisers through both its GUI and API.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok permite que os usuários recuperem anúncios selecionando ou especificando anunciantes específicos por meio de sua GUI e API.
- code: AD_OC7
  selected_answer: both
  notes: The TikTok Commercial Content Library allows ads to be retrieved using search terms through both its GUI and API.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok permite que anúncios sejam recuperados usando termos de pesquisa por meio de sua GUI e API.
- code: AD_OC8
  selected_answer: both
  notes: Country abbreviations are provided in a standardized format in both the TikTok Commercial Content Library API and GUI. In the API, date information is returned as a string containing the year, month, and day without separators. Although this representation complies with the basic rules of ISO 8601, it may not be supported by all parsers.
  notes_pt: As abreviaturas dos países são fornecidas em um formato padronizado na API e na GUI da TikTok Commercial Content Library. Na API, as informações de data são retornadas como uma string contendo ano, mês e dia sem separadores. Embora esta representação esteja em conformidade com as regras básicas da ISO 8601, ela pode não ser suportada por todos os analisadores.
completeness_answers:
- code: AD_OC9
  selected_answer: both
  notes: Advertiser identities are disclosed in both the TikTok Commercial Content Library API and GUI.
  notes_pt: As identidades dos anunciantes são divulgadas na API e na GUI da TikTok Commercial Content Library.
- code: AD_OC10
  selected_answer: both
  notes: The identities of ad funders are disclosed in both the TikTok Commercial Content Library API and GUI.
  notes_pt: As identidades dos financiadores de anúncios são divulgadas na API e na GUI da TikTok Commercial Content Library.
- code: AD_OC11
  selected_answer: both
  notes: The TikTok Commercial Content Library discloses the dates on which users first and last saw an ad on the platform through both its API and GUI.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok divulga as datas em que os usuários viram pela primeira e última vez um anúncio na plataforma por meio de sua API e GUI.
- code: AD_OC12
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not provide any data on user engagement with ads.
  notes_pt: A Biblioteca de Conteúdo Comercial da TikTok não fornece quaisquer dados sobre o envolvimento do usuário com os anúncios.
- code: AD_OC13
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not disclose any information on advertisers' verification status.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok não divulga nenhuma informação sobre o status de verificação dos anunciantes.
compliance_answers:
- code: AD_OC14
  selected_answer: gui
  notes: It is possible to identify moderated ads in the TikTok Commercial Content Library, although the video content may be unavailable. However, while moderated and removed ads in the user interface include specific reasons for the enforcement action when users access additional details, the TikTok Commercial Content API provides only a generic statement — "Removed from TikTok due to a violation of TikTok’s terms". We consider this insufficient for the tool to fully meet the requirements of this assessment.
  notes_pt: É possível identificar anúncios moderados na Biblioteca de Conteúdo Comercial do TikTok, embora o conteúdo do vídeo possa estar indisponível. No entanto, embora os anúncios moderados e removidos na interface do usuário incluam motivos específicos para a ação de fiscalização quando os usuários acessam detalhes adicionais, a API de conteúdo comercial do TikTok fornece apenas uma declaração genérica – "Removido do TikTok devido a uma violação dos termos do TikTok". Consideramos isso insuficiente para que a ferramenta atenda plenamente aos requisitos desta avaliação.
- code: AD_OC15
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not provide any information regarding the use of generative AI in the creation or manipulation of ad content.
  notes_pt: A Biblioteca de Conteúdo Comercial da TikTok não fornece nenhuma informação sobre o uso de IA generativa na criação ou manipulação de conteúdo publicitário.
- code: AD_OC16
  selected_answer: both
  notes: Both the TikTok Commercial Content Library [API](https://developers.tiktok.com/products/commercial-content-api) and [GUI](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library) documentation are publicly available to any interested party and can be accessed without login or authentication.
  notes_pt: Tanto a documentação da Biblioteca de Conteúdo Comercial TikTok [API](https://developers.tiktok.com/products/commercial-content-api) quanto [GUI](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library) estão disponíveis publicamente para qualquer parte interessada e podem ser acessadas sem login ou autenticação.
- code: AD_OC17
  selected_answer: both
  notes: Both the TikTok Commercial Content Library [API](https://developers.tiktok.com/products/commercial-content-api) and [GUI](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library) documentation are clearly structured and comprehensively documented, including detailed descriptions of access mechanisms, request parameters, endpoints, search functionalities, references, retrieved data fields, and illustrative usage scenarios.
  notes_pt: Tanto a documentação da Biblioteca de Conteúdo Comercial TikTok [API](https://developers.tiktok.com/products/commercial-content-api) quanto a [GUI](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library) são claramente estruturadas e amplamente documentadas, incluindo descrições detalhadas de mecanismos de acesso, parâmetros de solicitação, endpoints, funcionalidades de pesquisa, referências, campos de dados recuperados e cenários de uso ilustrativos.
- code: AD_OC18
  selected_answer: api
  notes: The TikTok Commercial Content Library API is governed by TikTok’s [developer terms of service](https://www.tiktok.com/legal/page/global/tik-tok-developer-terms-of-service/en) and [developer guidelines](https://developers.tiktok.com/doc/our-guidelines-developer-guidelines?enter_method=left_navigation), which are clearly documented and readily accessible. On the other hand, we did not identify any guidelines governing the use of the GUI tool.
  notes_pt: A API da biblioteca de conteúdo comercial do TikTok é regida pelos [developer terms of service](https://www.tiktok.com/legal/page/global/tik-tok-developer-terms-of-service/en) e [developer guidelines](https://developers.tiktok.com/doc/our-guidelines-developer-guidelines?enter_method=left_navigation) do TikTok, que são claramente documentados e prontamente acessíveis. Por outro lado, não identificamos nenhuma diretriz que rege o uso da ferramenta GUI.
- code: AD_OC19
  selected_answer: gui
  notes: The [TikTok Commercial Content API documentation](https://developers.tiktok.com/products/commercial-content-api) is only available in English. On the other hand, the [TikTok Commercial Content Library GUI documentation](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library) is available in all the official EU languages.
  notes_pt: O [TikTok Commercial Content API documentation](https://developers.tiktok.com/products/commercial-content-api) está disponível apenas em inglês. Por outro lado, o [TikTok Commercial Content Library GUI documentation](https://support.tiktok.com/en/account-and-privacy/personalized-ads-and-data/commercial-content-library) está disponível em todos os idiomas oficiais da UE.
- code: AD_OC20
  selected_answer: 'yes'
  notes: TikTok provides a dedicated [changelog](https://developers.tiktok.com/doc/changelog?enter_method=left_navigation) for its Commercial Content Library API, which documents the dates and descriptions of newly introduced features or modifications, as well as the final support dates for deprecated functionalities.
  notes_pt: O TikTok fornece um [changelog](https://developers.tiktok.com/doc/changelog?enter_method=left_navigation) dedicado para sua API de biblioteca de conteúdo comercial, que documenta as datas e descrições de recursos ou modificações recentemente introduzidas, bem como as datas finais de suporte para funcionalidades obsoletas.
- code: AD_OC21
  selected_answer: 'yes'
  notes: The [TikTok Commercial Content API documentation provides](https://developers.tiktok.com/products/commercial-content-api), for each available endpoint, the expected response for both successful requests and error cases, as well as the response data structure, including the type, description, and an example for each data field in the response.
  notes_pt: O [TikTok Commercial Content API documentation provides](https://developers.tiktok.com/products/commercial-content-api), para cada terminal disponível, a resposta esperada para solicitações bem-sucedidas e casos de erro, bem como a estrutura de dados da resposta, incluindo o tipo, a descrição e um exemplo para cada campo de dados na resposta.
- code: AD_OC22
  selected_answer: 'no'
  notes: Although TikTok’s developer documentation includes a section on [rate limiting](https://developers.tiktok.com/doc/tiktok-api-v2-rate-limit?enter_method=left_navigation), it only states that each API is subject to its own limits. We were unable to identify any specific rate-limit thresholds applicable to the Commercial Content Library API.
  notes_pt: Embora a documentação do desenvolvedor do TikTok inclua uma seção sobre [rate limiting](https://developers.tiktok.com/doc/tiktok-api-v2-rate-limit?enter_method=left_navigation), ela apenas afirma que cada API está sujeita a seus próprios limites. Não foi possível identificar nenhum limite de taxa específico aplicável à API da Biblioteca de Conteúdo Comercial.
consistency_answers:
- code: AD_OC23
  selected_answer: 'yes'
  notes: All information available in the TikTok Commercial Content Library GUI is also present in the TikTok Commercial Content API responses.
  notes_pt: Todas as informações disponíveis na GUI da Biblioteca de Conteúdo Comercial do TikTok também estão presentes nas respostas da API de Conteúdo Comercial do TikTok.
- code: AD_OC24
  selected_answer: both
  notes: We conducted a test using the TikTok Commercial Content API by issuing five identical requests with the same parameters, saving each response to a separate file, and comparing whether all ads appeared consistently across the files. We observed that the full set of ads was present in every response. The GUI was likewise found to return consistent results across repeated queries.
  notes_pt: Conduzimos um teste usando a API de conteúdo comercial do TikTok emitindo cinco solicitações idênticas com os mesmos parâmetros, salvando cada resposta em um arquivo separado e comparando se todos os anúncios apareciam de forma consistente nos arquivos. Observamos que o conjunto completo de anúncios estava presente em todas as respostas. Da mesma forma, descobriu-se que a GUI retorna resultados consistentes em consultas repetidas.
- code: AD_OC25
  selected_answer: both
  notes: We conducted a test of the TikTok Commercial Content Library API using five requests with different parameter configurations. The results were compared against the specified filters, and all responses were successfully validated, with the exception of the country filter. The API response does not include a field that allows direct verification of the country parameter. To confirm this information, it would be necessary to query each ad individually through the corresponding detail endpoint. For the GUI, all displayed advertisements were consistent with the applied filters.
  notes_pt: Conduzimos um teste da API TikTok Commercial Content Library usando cinco solicitações com diferentes configurações de parâmetros. Os resultados foram comparados com os filtros especificados e todas as respostas foram validadas com sucesso, com exceção do filtro de país. A resposta da API não inclui um campo que permita a verificação direta do parâmetro país. Para confirmar esta informação, seria necessário consultar cada anúncio individualmente através do endpoint de detalhe correspondente. Para a GUI, todos os anúncios exibidos foram consistentes com os filtros aplicados.
relevance_answers:
- code: AD_OC26
  selected_answer: both
  notes: The TikTok Commercial Content Library enables users to retrieve ads by specifying delivery start and end dates through both the GUI and the API.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok permite que os usuários recuperem anúncios especificando as datas de início e término da entrega por meio da GUI e da API.
- code: AD_OC27
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not allow data to be filtered by ad category.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok não permite que os dados sejam filtrados por categoria de anúncio.
- code: AD_OC28
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library only allows data to be filtered by country.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok só permite que os dados sejam filtrados por país.
accuracy_answers:
- code: AD_OC29
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not provide any age or gender information about an ad’s audience.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok não fornece nenhuma informação de idade ou sexo sobre o público de um anúncio.
- code: AD_OC30
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not provide any subnational location data about an ad’s audience.
  notes_pt: A Biblioteca de Conteúdo Comercial da TikTok não fornece dados de localização subnacional sobre o público de um anúncio.
- code: AD_OC31
  selected_answer: both
  notes: The TikTok Commercial Content Library GUI provides information on advertiser-defined targeting criteria, including age, gender, and interests. While this information is accessible via the Commercial Content API, it is only available when a specific ad ID is provided and we could not retrieve it through the API’s standard search or bulk retrieval endpoints.
  notes_pt: A GUI da biblioteca de conteúdo comercial do TikTok fornece informações sobre critérios de segmentação definidos pelo anunciante, incluindo idade, sexo e interesses. Embora essas informações possam ser acessadas por meio da API de conteúdo comercial, elas só estarão disponíveis quando um ID de anúncio específico for fornecido e não foi possível recuperá-lo por meio da pesquisa padrão da API ou dos pontos de extremidade de recuperação em massa.
- code: AD_OC32
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library provides data on the number of ad recipients, but not at a sufficiently granular level.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok fornece dados sobre o número de destinatários do anúncio, mas não em um nível suficientemente granular.
- code: AD_OC33
  selected_answer: 'no'
  notes: The TikTok Commercial Content Library does not provide data on ad spending.
  notes_pt: A Biblioteca de Conteúdo Comercial TikTok não fornece dados sobre gastos com publicidade.
