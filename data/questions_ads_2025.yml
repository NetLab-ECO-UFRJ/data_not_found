  - code: AD_OC20
    title: Does the platform implement a proper deprecation strategy to avoid breaking client applications while rolling out major changes in the API?
    title_pt: A plataforma implementa uma estratégia adequada de descontinuação para evitar quebrar aplicações cliente ao introduzir mudanças importantes na API?
    description: >
      This item verifies whether the platform's documentation describes a deprecation strategy with a grace period
      before removing features. The assessment should review changelogs to confirm that deprecated features are listed
      with deprecation and removal dates and include migration instructions. This item applies only to breaking changes
      that require client updates, such as endpoint modifications, authentication updates, or the removal of features.
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
        weight: 1.0
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC21
    title: Does the platform's ad repository API documentation detail the response format of each endpoint?
    title_pt: A documentação da API do repositório de anúncios da plataforma detalha o formato de resposta de cada endpoint?
    description: >
      This item verifies whether the platform's ad repository API documentation specifies the format of each possible
      response, including examples and potential errors. The assessment should review the documentation to confirm that
      response structures are described and illustrated with sample outputs.
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
        weight: 1.0
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC22
    title: Does the platform's ad repository API documentation detail the quota or rate limits applicable to each available endpoint?
    title_pt: A documentação da API do repositório de anúncios da plataforma detalha as cotas ou os limites de taxa aplicáveis a cada endpoint disponível?
    description: >
      This item verifies whether the platform's ad repository API documentation specifies the limits for each endpoint,
      including any variations based on authentication level or endpoint type. Rate and quota limits define the maximum
      number of requests allowed within a given period (e.g., 1,000 requests per hour). The assessment should review
      the documentation to confirm that request caps (rate limits) and overall usage restrictions (quotas) are clearly
      stated.
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
        weight: 1.0
      - value: 'no'
        label: "No"
        weight: 0.0

consistency:
  - code: AD_OC23
    title: Does the data retrieved by the API reflect what is displayed on the platform's ad repository GUI?
    title_pt: Os dados recuperados pela API refletem o que é exibido na interface gráfica do repositório de anúncios da plataforma?
    description: >
      This item verifies whether the data returned by the platform's ad repository API corresponds to the information
      displayed on its GUI in all its levels of detail. It should be possible to identify in the API response information
      such as authorship, complete content, and other serving information (e.g., amount spent, impressions reached).
      The assessment should compare API responses with the GUI to confirm that at least the following elements are
      consistent: authorship, full content, and serving information (e.g., spending, impressions).
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
        weight: 1.0
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC24
    title: Are the results returned by the platform consistently reproducible?
    title_pt: Os resultados retornados pela plataforma são reproduzíveis de forma consistente?
    description: >
      This item verifies whether data accessed and extracted via the platform’s ad repository at a given time is consistent with other collections performed similarly. The assessment should perform repeated queries to confirm the reproducibility of results or ground the response based on recent (less than 2 years) experiments published in peer-reviewed journals.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

