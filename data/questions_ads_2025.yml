special_criteria:
  - code: AD_SC1
    title: Does the platform provide an API to access its ad repository and extract data on advertising content for independent analysis?
    title_pt: A plataforma fornece uma API para acessar seu repositório de anúncios e extrair dados sobre conteúdo publicitário para análise independente?
    description: >
      This item verifies whether the platform provides an ad repository API with at least one endpoint for
      programmatically extracting advertising data. Full availability is confirmed when the API returns information
      on ads across all categories. The assessment should confirm that the endpoint allows the retrieval and storage
      of ad data without requiring privileged or internal access beyond standard developer registration.
    weight: 0.50
    answers:
      - value: full
        label: "Yes, with full availability"
        weight: 1.0
      - value: partial
        label: "Yes, with partial availability"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_SC2
    title: Does the platform provide a graphical user interface to its ad repository for extracting advertising content data?
    title_pt: A plataforma fornece uma interface gráfica para seu repositório de anúncios para extração de dados sobre conteúdo publicitário?
    description: >
      This item verifies whether the platform provides a graphical user interface (GUI) that enables the extraction of structured data without programming. Full availability is considered granted when the GUI delivers information on ads across all categories. The assessment should confirm the availability of an official browser-based tool that allows users not only to view ad content but also to export its data.
    weight: 0.30
    answers:
      - value: full
        label: "Yes, with full availability"
        weight: 1.0
      - value: partial
        label: "Yes, with partial availability"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_SC3
    title: Can data from both active and inactive ads be extracted?
    title_pt: É possível extrair dados tanto de anúncios ativos quanto inativos?
    description: >
      This item verifies whether the platform allows the extraction of ad data through either the GUI or the API,
      from at least one day after publication to at least one year prior. Full availability is confirmed when both
      active and inactive ad data are delivered across all ad categories. The assessment should test the interface
      and endpoints to confirm whether both active and inactive ads can be retrieved.
    weight: 0.20
    answers:
      - value: full
        label: "Yes, with full availability"
        weight: 1.0
      - value: partial
        label: "Yes, with partial availability"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

accessibility:
  - code: AD_OC1
    title: Does the platform provide a GUI for accessing and visualizing its ad repository?
    title_pt: A plataforma fornece uma interface gráfica para acessar e visualizar seu repositório de anúncios?
    description: >
      This item verifies whether the platform provides a GUI for accessing and viewing ads in its ad repository. Full
      access is confirmed when the GUI provides information on ads across all categories and publication statuses,
      including both active and inactive ads. The assessment should confirm the availability of an official
      browser-based tool that allows users to search, access, and view ad content.
    weight: 1.0
    answers:
      - value: full
        label: "Yes, with full availability"
        weight: 1.0
      - value: partial
        label: "Yes, with partial availability"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC2
    title: Is access to the platform's ad repository free of charge?
    title_pt: O acesso ao repositório de anúncios da plataforma é gratuito?
    description: >
      This item verifies whether the ad repository API or GUI is free of charge, since even modest fees can create
      barriers or force researchers in low-resourced settings to narrow the scope of their work. The assessment should
      verify the platform's documentation and pricing policies to confirm that no fees are applied for access to the
      ad repository.
    weight: 1.0
    answers:
      - value: both
        label: "Free API and GUI access"
        weight: 1.0
      - value: api
        label: "Free API access"
        weight: 0.5
      - value: gui
        label: "Free GUI access"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC3
    title: Can the requested data be extracted directly from the ad repository response?
    title_pt: Os dados solicitados podem ser extraídos diretamente da resposta do repositório de anúncios?
    description: >
      This item verifies whether the platform's ad repository returns structured data on ad content and authorship
      directly in the response, rather than providing a link that redirects to the data. Audiovisual media files and
      data (e.g., images, videos, and audio) should not be considered when assessing this item. The assessment should
      examine sample data responses from both the ad repository GUI and API to confirm that the requested public data
      is included in the returned payload.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC4
    title: Does the platform's ad repository API provide a form of authentication that allows for renewal without the risk of data loss?
    title_pt: A API do repositório de anúncios da plataforma fornece uma forma de autenticação que permite renovação sem risco de perda de dados?
    description: >
      This item verifies whether the tokens provided for API use can be renewed without the risk of data loss,
      ensuring continuity and integrity of data access and monitoring. The assessment should check the platform's
      documentation or directly observe the authentication and renewal process to confirm that token updates do not
      interrupt or compromise data access.
    weight: 1.0
    answers:
      - value: 'yes'
        label: "Yes"
        weight: 1.0
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC5
    title: Can data from an individual ad be retrieved from the platform?
    title_pt: É possível recuperar da plataforma dados de um anúncio individual?
    description: >
      This item verifies whether it is possible to retrieve data from a specific advertisement on the ad repository
      using a unique identifier, rather than relying on search terms or other parameters and filters. The assessment
      should review the ad repository documentation and test available features to confirm that an individual ad can
      be retrieved directly by its unique identifier.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC6
    title: Can data from ads served by a specific advertiser be retrieved from the platform?
    title_pt: É possível recuperar da plataforma dados de anúncios veiculados por um anunciante específico?
    description: >
      This item verifies whether it is possible to retrieve data from ads run by a specific advertiser, via their
      username or unique identifier. The assessment should review the ad repository documentation and test any
      available feature to retrieve data from an individual advertiser.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC7
    title: Can ad data be retrieved from the platform using search terms?
    title_pt: É possível recuperar dados de anúncios da plataforma usando termos de busca?
    description: >
      This item verifies whether ad data can be retrieved through search terms, enabling the creation of datasets based
      on those queries. The assessment should test search-related features to confirm that it accepts search queries
      using keywords.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

  - code: AD_OC8
    title: Does the platform use locale-neutral data representations?
    title_pt: A plataforma usa representações de dados neutras em relação à localidade?
    description: >
      This item verifies whether locale-sensitive data (e.g., timestamps, currency, numbers) are provided in a
      locale-neutral format, or, if that is not possible, whether relevant locale metadata is included. The assessment
      should review the ad repository documentation and inspect sample responses to confirm the presence of
      standardized formats or accompanying metadata.
    weight: 1.0
    answers:
      - value: both
        label: "Yes, through both GUI and API"
        weight: 1.0
      - value: gui
        label: "Yes, through the GUI"
        weight: 0.5
      - value: api
        label: "Yes, through the API"
        weight: 0.5
      - value: 'no'
        label: "No"
        weight: 0.0

