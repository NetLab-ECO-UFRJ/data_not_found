services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-not-found
    hostname: data-not-found
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.dnf-http.entryPoints=http
      - traefik.http.routers.dnf-http.rule=Host(`datanotfound.netlab.omeu.website`)
      - traefik.http.routers.dnf-http.middlewares=redirect-to-https
      - traefik.http.routers.dnf-https.entryPoints=https
      - traefik.http.routers.dnf-https.rule=Host(`datanotfound.netlab.omeu.website`)
      - traefik.http.routers.dnf-https.tls=true
      - traefik.http.routers.dnf-https.tls.certresolver=letsencrypt
      - traefik.http.routers.dnf-https.middlewares=gzip
      - traefik.http.services.dnf.loadbalancer.server.port=80
      - traefik.docker.network=web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - web

networks:
  web:
    external: true
